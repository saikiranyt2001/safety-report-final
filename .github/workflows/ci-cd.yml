
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install flake8 pytest

      - run: flake8 backend || true
      - run: pytest tests || true

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t safety-report-final:latest .

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: |
          docker tag safety-report-final:latest ${{ secrets.DOCKER_USERNAME }}/safety-report-final:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/safety-report-final:latest