<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download Report</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>


<!-- MAIN CONTENT -->
<main class="main-content">

<h1 class="page-title">Download Report</h1>

<p>Enter a report ID to download the generated safety report.</p>

<div class="download-card">

<label>Report ID</label>

<input
type="text"
id="reportId"
placeholder="Enter report ID"
>

<br><br>

<button class="detect-btn" onclick="downloadReport()">
Download Report
</button>

<div class="result" id="resultBox">
Download status will appear here.
</div>

</div>

</main>


<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

initSidebar()

})

/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

</script>

<script src="../js/main.js"></script>


<!-- DOWNLOAD REPORT -->
<script>

function downloadReport(){

let id=document.getElementById("reportId").value

if(id.trim()===""){
alert("Please enter a report ID")
return
}

document.getElementById("resultBox").innerHTML=

`
<h3>Download Ready</h3>

<p>Report ID <b>${id}</b> is ready to download.</p>

<button class="primary-btn">Download PDF</button>
`

}

</script>


<!-- AI CHAT SCRIPT -->
<script>

function toggleChat(){

let chat=document.getElementById("aiChat")
chat.classList.toggle("open")

}

function sendChat(){

let input=document.getElementById("chatInput")
let text=input.value.trim()

if(text==="") return

addChat(text,"user-msg")

let reply=generateReply(text)

setTimeout(()=>{
addChat(reply,"ai-msg")
},400)

input.value=""

}

function addChat(text,type){

let box=document.getElementById("chatMessages")

let div=document.createElement("div")

div.className=type
div.innerText=text

box.appendChild(div)

box.scrollTop=box.scrollHeight

}

function generateReply(q){

q=q.toLowerCase()

if(q.includes("hazard"))
return "Common hazards include slips, falls, electrical risks, and unsafe machinery."

if(q.includes("helmet"))
return "Workers must always wear PPE like helmets, gloves, and safety shoes."

if(q.includes("accident"))
return "Reduce accidents by conducting safety audits and enforcing PPE."

return "Safety tip: Always inspect equipment before starting work."

}

document.getElementById("chatInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendChat()
}

})

</script>

</body>
</html>
