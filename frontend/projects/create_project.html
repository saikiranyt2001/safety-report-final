<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Project</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/chat.css">

<script src="../js/auth.js"></script>

</head>

<body>

<script>
checkAuth();
</script>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- LAYOUT -->
<div class="layout">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN CONTENT -->
<div class="main-content">

<h1 class="page-title">Create Project</h1>
<p class="page-subtitle">Create a new safety monitoring project.</p>

<div class="container-rep-history">

<form id="projectForm">

<label class="form-label">Project Name</label>
<input type="text" name="project_name" class="form-input" required>

<label class="form-label">Location</label>
<input type="text" name="location" class="form-input" required>

<button type="submit" class="primary-btn">
Create Project
</button>

</form>

<div id="result" class="form-success"></div>

</div>

</div>

</div>

<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>

<!-- FOOTER -->
<div id="footer"></div>

<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize search */
initSearch()

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})

/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

/* CREATE PROJECT */

document.getElementById("projectForm").onsubmit = async function(e){

e.preventDefault()

const form = e.target

const res = await fetch("/api/create-project",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

project_name: form.project_name.value,
location: form.location.value

})

})

const text = await res.text()

document.getElementById("result").innerText = text

}

</script>

<script src="../js/main.js"></script>

</body>
</html>
