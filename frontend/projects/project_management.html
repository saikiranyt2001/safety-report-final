<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Management</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/chat.css">

<script src="../js/auth.js"></script>

</head>

<body>

<script>
checkAuth();
</script>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- LAYOUT -->
<div class="layout">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN CONTENT -->
<div class="main-content">

<h1 class="page-title">Project Management</h1>
<p class="page-subtitle">Track projects, inspections, and safety reports.</p>

<div class="container-rep-history">

<table class="table">

<thead>
<tr>
<th>Project</th>
<th>Location</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="projectTable">

<tr>
<td>Factory Safety AI</td>
<td>Hyderabad</td>
<td><span class="badge low">Active</span></td>
<td>
<button class="primary-btn">View</button>
<button class="danger-btn">Delete</button>
</td>
</tr>

<tr>
<td>Autonomous Vehicle Safety</td>
<td>Bangalore</td>
<td><span class="badge medium">Pending</span></td>
<td>
<button class="primary-btn">View</button>
<button class="danger-btn">Delete</button>
</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>

<!-- FOOTER -->
<div id="footer"></div>

<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize search */
initSearch()

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})

/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

</script>

<script src="../js/main.js"></script>

</body>
</html>
