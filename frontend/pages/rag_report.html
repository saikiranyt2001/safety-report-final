<!DOCTYPE html>
<html>
<head>
<title>RAG Safety Report</title>

<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>


<!-- MAIN CONTENT -->
<div class="main-content p-10">

<h1 class="text-3xl font-bold mb-6">RAG Safety Report</h1>

<p class="text-gray-600 mb-8">
Generate an AI safety report using contextual documents.
</p>

<div class="bg-white p-8 rounded-xl shadow max-w-xl">

<label class="block mb-2 font-semibold">
Paste document or context
</label>

<textarea
id="context"
rows="6"
class="w-full border p-3 rounded mb-4"
placeholder="Paste safety guidelines, model documentation, or logs..."
></textarea>

<button
onclick="generateRAGReport()"
class="bg-purple-600 text-white px-6 py-3 rounded hover:bg-purple-700"
>
Generate AI Report
</button>

</div>


<div id="result" class="mt-10 hidden">

<h2 class="text-xl font-bold mb-4">
AI Generated Report
</h2>

<div class="bg-white p-6 rounded shadow max-w-xl">

<p id="ragOutput" class="text-gray-700"></p>

</div>

</div>

</div>


<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

if(typeof initSidebar === "function"){
initSidebar()
}

})

/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer").innerHTML = data
})

</script>


<!-- RAG REPORT -->
<script>

async function generateRAGReport(){

const context = document.getElementById("context").value;

if(!context){
alert("Please provide context");
return;
}

const response = await fetch(
"http://localhost:8000/rag-report",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({context:context})
}
);

const data = await response.json();

document.getElementById("ragOutput").innerText = data.report;
document.getElementById("result").classList.remove("hidden");

}

</script>


<!-- AI CHAT SCRIPT -->
<script>

function toggleChat(){
let chat=document.getElementById("aiChat")
chat.classList.toggle("open")
}

function sendChat(){

let input=document.getElementById("chatInput")
let text=input.value.trim()

if(text==="") return

addChat(text,"user-msg")

let reply=generateReply(text)

setTimeout(()=>{
addChat(reply,"ai-msg")
},500)

input.value=""

}

function addChat(text,type){

let box=document.getElementById("chatMessages")

let div=document.createElement("div")

div.className=type
div.innerText=text

box.appendChild(div)

box.scrollTop=box.scrollHeight

}

function generateReply(q){

q=q.toLowerCase()

if(q.includes("hazard"))
return "Common hazards include slips, falls, electrical risks, and unsafe machinery."

if(q.includes("helmet"))
return "Workers should always wear PPE like helmets, gloves, and safety shoes."

if(q.includes("accident"))
return "Reduce accidents by conducting safety audits and enforcing PPE compliance."

return "Safety tip: Always inspect equipment before starting work."

}

document.getElementById("chatInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendChat()
}
})

</script>


<script src="../js/main.js"></script>

</body>
</html>
