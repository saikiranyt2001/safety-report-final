<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Safety Report</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root {
	--bg-1: #f1f7ff;
	--bg-2: #e4f4ef;
	--panel: rgba(255, 255, 255, 0.82);
	--panel-strong: #ffffff;
	--text: #102a43;
	--muted: #52606d;
	--primary: #0b7285;
	--accent: #2f9e44;
	--warn: #d9480f;
	--border: rgba(16, 42, 67, 0.08);
	--shadow: 0 18px 45px rgba(11, 114, 133, 0.12);
}

* {
	box-sizing: border-box;
}

body {
	margin: 0;
	font-family: "Space Grotesk", sans-serif;
	color: var(--text);
	background:
		radial-gradient(circle at 10% 10%, rgba(47, 158, 68, 0.18), transparent 30%),
		radial-gradient(circle at 90% 15%, rgba(11, 114, 133, 0.17), transparent 28%),
		linear-gradient(135deg, var(--bg-1), var(--bg-2));
	min-height: 100vh;
}

.main-content {
	max-width: 1080px;
	margin: 2rem auto;
	padding: 2rem;
	border: 1px solid var(--border);
	border-radius: 24px;
	background: var(--panel);
	backdrop-filter: blur(4px);
	box-shadow: var(--shadow);
}

.rag-header {
	display: flex;
	align-items: end;
	justify-content: space-between;
	gap: 1rem;
	margin-bottom: 1.5rem;
}

.rag-title {
	margin: 0;
	font-size: clamp(1.8rem, 4vw, 2.6rem);
	letter-spacing: -0.03em;
}

.rag-subtitle {
	margin: 0.35rem 0 0;
	color: var(--muted);
	font-size: 0.98rem;
}

.header-badge {
	background: linear-gradient(135deg, #d3f9d8, #99e9f2);
	color: #0c3f53;
	border: 1px solid rgba(12, 63, 83, 0.2);
	border-radius: 999px;
	padding: 0.45rem 0.9rem;
	font-size: 0.82rem;
	font-weight: 600;
	white-space: nowrap;
}

.rag-form {
	border: 1px solid var(--border);
	border-radius: 18px;
	padding: 1.1rem;
	background: var(--panel-strong);
	box-shadow: 0 6px 20px rgba(16, 42, 67, 0.06);
	max-width: 720px;
}

.rag-label {
	display: block;
	margin-bottom: 0.45rem;
	font-size: 0.92rem;
	font-weight: 600;
	color: #234;
}

.rag-textarea {
	width: 100%;
	padding: 0.72rem 0.78rem;
	border: 1px solid var(--border);
	border-radius: 12px;
	background: #f8fbfd;
	font-family: "Space Grotesk", sans-serif;
	font-size: 0.95rem;
	resize: vertical;
	margin-bottom: 0.9rem;
}

.rag-btn {
	border: 0;
	border-radius: 12px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.72rem 1rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	cursor: pointer;
	box-shadow: 0 12px 24px rgba(11, 114, 133, 0.24);
}

.rag-secondary-btn {
	border: 1px solid rgba(11, 114, 133, 0.2);
	border-radius: 12px;
	background: #fff;
	color: var(--primary);
	padding: 0.72rem 1rem;
	margin-left: 0.7rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	cursor: pointer;
}

.rag-result {
	margin-top: 1rem;
}

.result-title {
	margin: 0 0 0.7rem;
	font-size: 1.15rem;
	font-weight: 700;
}

.result-card {
	border: 1px solid rgba(16, 42, 67, 0.1);
	background: linear-gradient(90deg, #f8fbfd, #edf8f2);
	border-radius: 12px;
	padding: 0.9rem;
	max-width: 720px;
}

.result-text {
	color: var(--muted);
}

.chat-toggle-btn {
	border: 0;
	border-radius: 999px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.7rem 1rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	box-shadow: 0 12px 24px rgba(11, 114, 133, 0.25);
}

.ai-chat-sidebar {
	border-radius: 16px 16px 0 0;
	overflow: hidden;
}

.chat-header,
.chat-input button {
	font-family: "Space Grotesk", sans-serif;
}

@media (max-width: 680px) {
	.main-content {
		margin: 1rem;
		padding: 1.2rem;
		border-radius: 18px;
	}

	.rag-header {
		align-items: flex-start;
		flex-direction: column;
	}
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>


<!-- MAIN CONTENT -->
<div class="main-content">

<div class="rag-header">
<div>
<h1 class="rag-title">RAG Safety Report</h1>
<p class="rag-subtitle">Generate an AI safety report using contextual documents.</p>
</div>
<span class="header-badge">Retrieval Engine Online</span>
</div>

<div class="rag-form">

<label class="rag-label">
Paste document or context
</label>

<textarea
id="context"
rows="6"
class="rag-textarea"
placeholder="Paste safety guidelines, model documentation, or logs..."
></textarea>

<button
onclick="generateRAGReport()"
class="rag-btn"
>
Generate AI Report
</button>

<button
type="button"
onclick="pasteContextFromClipboard()"
class="rag-secondary-btn"
>
Paste From Clipboard
</button>

</div>


<div id="result" class="rag-result hidden">

<h2 class="result-title">
AI Generated Report
</h2>

<div class="result-card">

<p id="ragOutput" class="result-text"></p>

</div>

</div>

</div>


<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})

/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer").innerHTML = data
})

</script>


<!-- RAG REPORT -->
<script>

const ragContextArea = document.getElementById("context")

ragContextArea.addEventListener("paste", function(event){
const pastedText = event.clipboardData ? event.clipboardData.getData("text") : ""
if(!pastedText){
return
}

event.preventDefault()
const start = this.selectionStart
const end = this.selectionEnd
const currentValue = this.value
this.value = currentValue.slice(0, start) + pastedText + currentValue.slice(end)
this.selectionStart = this.selectionEnd = start + pastedText.length
})

async function pasteContextFromClipboard(){
if(!navigator.clipboard || !navigator.clipboard.readText){
alert("Clipboard access is not available in this browser. Use Ctrl+V in the context box.")
return
}

try {
const text = await navigator.clipboard.readText()
if(!text.trim()){
alert("Clipboard is empty.")
return
}
ragContextArea.value = text
ragContextArea.focus()
} catch (_error) {
alert("Clipboard access was blocked. Click in the context box and press Ctrl+V.")
}
}

async function generateRAGReport(){

const context = document.getElementById("context").value;

if(!context){
alert("Please provide context");
return;
}

try {
const response = await fetch(
window.location.origin + "/api/rag-report",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({context:context})
}
);

if(!response.ok){
const errorText = await response.text()
throw new Error(errorText || "Failed to generate RAG report")
}

const data = await response.json();

document.getElementById("ragOutput").innerText = data.report || "No report generated.";
document.getElementById("result").classList.remove("hidden");
} catch (error) {
document.getElementById("ragOutput").innerText = error.message || "Unable to generate report.";
document.getElementById("result").classList.remove("hidden");
}

}

</script>
<script src="../js/main.js"></script>
<script>
initSearch()
wireBackendChat()
</script>

</body>
</html>
