<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Profile</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/chat.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
	--bg-1: #f1f7ff;
	--bg-2: #e4f4ef;
	--panel: rgba(255, 255, 255, 0.82);
	--panel-strong: #ffffff;
	--text: #102a43;
	--muted: #52606d;
	--primary: #0b7285;
	--border: rgba(16, 42, 67, 0.08);
	--shadow: 0 18px 45px rgba(11, 114, 133, 0.12);
}

* {
	box-sizing: border-box;
}

body {
	margin: 0;
	font-family: "Space Grotesk", sans-serif;
	color: var(--text);
	background:
		radial-gradient(circle at 10% 10%, rgba(47, 158, 68, 0.18), transparent 30%),
		radial-gradient(circle at 90% 15%, rgba(11, 114, 133, 0.17), transparent 28%),
		linear-gradient(135deg, var(--bg-1), var(--bg-2));
	min-height: 100vh;
}

.layout {
	max-width: 1120px;
	margin: 2rem auto;
	padding: 0 1rem;
}

.main-content {
	border: 1px solid var(--border);
	border-radius: 24px;
	background: var(--panel);
	backdrop-filter: blur(4px);
	box-shadow: var(--shadow);
	padding: 2rem;
}

.profile-header {
	display: flex;
	align-items: end;
	justify-content: space-between;
	gap: 1rem;
	margin-bottom: 1.3rem;
}

.page-title {
	margin: 0;
	font-size: clamp(1.8rem, 4vw, 2.6rem);
	letter-spacing: -0.03em;
}

.profile-subtitle {
	margin: 0.35rem 0 0;
	color: var(--muted);
	font-size: 0.98rem;
}

.header-badge {
	background: linear-gradient(135deg, #d3f9d8, #99e9f2);
	color: #0c3f53;
	border: 1px solid rgba(12, 63, 83, 0.2);
	border-radius: 999px;
	padding: 0.45rem 0.9rem;
	font-size: 0.82rem;
	font-weight: 600;
	white-space: nowrap;
}

.profile-box {
	border: 1px solid var(--border);
	border-radius: 18px;
	padding: 1.2rem;
	background: var(--panel-strong);
	box-shadow: 0 6px 20px rgba(16, 42, 67, 0.06);
	max-width: 760px;
}

.profile-row {
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 0.72rem 0.2rem;
	border-bottom: 1px solid rgba(16, 42, 67, 0.08);
	gap: 1rem;
}

.profile-row:last-of-type {
	border-bottom: 0;
	margin-bottom: 0.7rem;
}

.profile-row strong {
	color: #234;
	font-size: 0.92rem;
}

.profile-row span {
	color: var(--muted);
	font-size: 0.95rem;
	font-weight: 500;
	text-align: right;
	word-break: break-word;
}

.logout-btn {
	border: 0;
	border-radius: 12px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.7rem 1rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	cursor: pointer;
	box-shadow: 0 12px 24px rgba(11, 114, 133, 0.24);
}

@media (max-width: 680px) {
	.layout {
		margin: 1rem auto;
	}

	.main-content {
		padding: 1.2rem;
		border-radius: 18px;
	}

	.profile-header {
		align-items: flex-start;
		flex-direction: column;
	}

	.profile-row {
		flex-direction: column;
		align-items: flex-start;
	}

	.profile-row span {
		text-align: left;
	}
}
</style>

</head>

<body>

<!-- LAYOUT -->
<div class="layout">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>



<!-- MAIN CONTENT -->
<div class="main-content">

<div class="profile-header">
<div>
<h1 class="page-title">User Profile</h1>
<p class="profile-subtitle">View account identity and session details.</p>
</div>
<span class="header-badge">Account Active</span>
</div>

<div class="container profile-box">

<div class="profile-row">
<strong>Name:</strong>
<span id="profileName"></span>
</div>

<div class="profile-row">
<strong>Email:</strong>
<span id="profileEmail"></span>
</div>

<div class="profile-row">
<strong>Role:</strong>
<span id="profileRole"></span>
</div>

<div class="profile-row">
<strong>Last Login:</strong>
<span id="profileLogin"></span>
</div>

<br>

<button class="logout-btn" onclick="logoutUser()">Logout</button>

</div>

</div>

</div>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize search */
initSearch()

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})

/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer").innerHTML = data
})


/* LOAD USER DATA AFTER PAGE LOAD */
window.onload = function(){

document.getElementById("profileName").innerText =
localStorage.getItem("user_name") || "Admin User"

document.getElementById("profileEmail").innerText =
localStorage.getItem("user_email") || "admin@safetyai.com"

document.getElementById("profileRole").innerText =
localStorage.getItem("user_role") || "Administrator"

document.getElementById("profileLogin").innerText =
new Date().toLocaleString()

}


/* LOGOUT FUNCTION */
function logoutUser(){

localStorage.removeItem("token")
localStorage.removeItem("user_name")
localStorage.removeItem("user_email")
localStorage.removeItem("user_role")

window.location.href = "../pages/login.html"

}

</script>
<script src="../js/main.js"></script>
</body>
</html>
