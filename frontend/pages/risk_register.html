<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Risk Register</title>

<link rel="stylesheet" href="../css/style.css">

<style>
.risk-summary {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
gap: 14px;
margin: 16px 0 20px;
}

.risk-card {
background: #fff;
border: 1px solid #e6edf5;
border-radius: 10px;
padding: 16px;
box-shadow: 0 3px 10px rgba(15, 23, 42, 0.05);
}

.risk-card h3 {
margin: 0;
font-size: 28px;
}

.risk-toolbar {
display: flex;
justify-content: space-between;
align-items: center;
flex-wrap: wrap;
gap: 10px;
margin-bottom: 16px;
}

.risk-filters {
display: flex;
gap: 8px;
flex-wrap: wrap;
}

.risk-filters button,
.risk-actions button {
padding: 8px 12px;
border: 1px solid #d0d7de;
border-radius: 8px;
background: #6b5f5f;
cursor: pointer;
}

.risk-filters button.active,
.risk-actions .primary {
background: #0b63ce;
border-color: #0b63ce;
color: #fff;
}

.risk-search {
padding: 8px 10px;
border: 1px solid #d0d7de;
border-radius: 8px;
min-width: 240px;
}

.risk-table-wrap {
background: #fff;
border: 1px solid #e6edf5;
border-radius: 10px;
overflow: auto;
}

.risk-table {
width: 100%;
border-collapse: collapse;
min-width: 980px;
}

.risk-table th,
.risk-table td {
padding: 12px;
text-align: left;
border-bottom: 1px solid #eef3f8;
font-size: 14px;
}

.risk-table th {
background: #f8fbff;
font-weight: 700;
}

.level-pill,
.owner-pill,
.status-pill {
display: inline-block;
padding: 4px 8px;
border-radius: 999px;
font-size: 12px;
font-weight: 700;
}

.level-pill.high {
background: #fdecea;
color: #b3261e;
}

.level-pill.medium {
background: #fff4e5;
color: #8c5d00;
}

.level-pill.low {
background: #e9f7ef;
color: #146c43;
}

.status-pill.open {
background: #e8f0fe;
color: #174ea6;
}

.status-pill.mitigating {
background: #fff4e5;
color: #8c5d00;
}

.status-pill.closed {
background: #e9f7ef;
color: #146c43;
}

.owner-pill {
background: #eef3f8;
color: #334155;
}

.row-actions button {
padding: 6px 10px;
border: 1px solid #d0d7de;
border-radius: 8px;
background: #418274;
cursor: pointer;
margin-right: 6px;
}

.status-note {
margin-top: 12px;
font-size: 14px;
min-height: 20px;
color: #1e6f43;
}
</style>

</head>

<body>

<div class="navbar">
<div class="logo">AI Safety Platform</div>
<div class="nav-right">
<span>Admin</span>
<button onclick="logout()">Logout</button>
</div>
</div>

<div id="sidebar-container"></div>

<div class="main-content">
<h1>Risk Register</h1>
<p>Maintain a structured view of identified risks, owners, mitigations, and current status.</p>

<div class="risk-summary">
<div class="risk-card">
<h3>21</h3>
<p>Total Risks</p>
</div>
<div class="risk-card">
<h3>4</h3>
<p>High Risks</p>
</div>
<div class="risk-card">
<h3>9</h3>
<p>Under Mitigation</p>
</div>
<div class="risk-card">
<h3>8</h3>
<p>Closed Items</p>
</div>
</div>

<div class="risk-toolbar">
<div class="risk-filters">
<button class="active" data-filter="all">All</button>
<button data-filter="open">Open</button>
<button data-filter="mitigating">Mitigating</button>
<button data-filter="closed">Closed</button>
</div>
<div class="risk-actions">
<input id="riskSearch" class="risk-search" type="text" placeholder="Search risk, owner, or category...">
<button class="primary" onclick="addRisk()">Add Risk</button>
</div>
</div>

<div class="risk-table-wrap">
<table class="risk-table" id="riskTable">
<thead>
<tr>
<th>ID</th>
<th>Risk</th>
<th>Category</th>
<th>Level</th>
<th>Status</th>
<th>Owner</th>
<th>Mitigation</th>
<th>Review Date</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
</div>

<div class="status-note" id="riskStatus"></div>

</div>

<div id="footer"></div>

<script>
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {
document.getElementById("sidebar-container").innerHTML = data

initSearch()

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){
toggleBtn.onclick = function(){
sidebar.classList.toggle("collapsed")
if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")
const footer = document.querySelector(".footer")
if(footer){
footer.classList.toggle("expanded")
}
}
}
})

fetch("../components/footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer").innerHTML = data
})

if(!(localStorage.getItem("auth_token") || localStorage.getItem("token") || localStorage.getItem("access_token"))){
window.location.href = "login.html"
}

function logout(){
localStorage.removeItem("auth_token")
localStorage.removeItem("token")
localStorage.removeItem("access_token")
window.location.href = "login.html"
}

const riskSearch = document.getElementById("riskSearch")
const riskTableBody = document.querySelector("#riskTable tbody")
const riskToken = localStorage.getItem("auth_token") || localStorage.getItem("token") || localStorage.getItem("access_token")
let activeRiskFilter = "all"
let riskCache = []

function riskHeaders(){
return {
"Content-Type": "application/json",
"Authorization": "Bearer " + riskToken
}
}

function uiStatus(status){
if(status === "in_progress") return "mitigating"
if(status === "resolved" || status === "closed") return "closed"
return "open"
}

function levelClass(priority){
const normalized = (priority || "").toLowerCase()
if(normalized === "critical" || normalized === "high") return "high"
if(normalized === "medium") return "medium"
return "low"
}

function levelLabel(priority){
const normalized = (priority || "medium").toLowerCase()
return normalized.charAt(0).toUpperCase() + normalized.slice(1)
}

function statusLabel(status){
const normalized = uiStatus(status)
if(normalized === "mitigating") return "Mitigating"
if(normalized === "closed") return "Closed"
return "Open"
}

function formatDeadline(value){
if(!value) return "-"
return new Date(value).toLocaleDateString()
}

function renderSummary(items){
document.querySelectorAll(".risk-card h3")[0].textContent = String(items.length)
document.querySelectorAll(".risk-card h3")[1].textContent = String(items.filter(item => levelClass(item.priority) === "high").length)
document.querySelectorAll(".risk-card h3")[2].textContent = String(items.filter(item => uiStatus(item.status) === "mitigating").length)
document.querySelectorAll(".risk-card h3")[3].textContent = String(items.filter(item => uiStatus(item.status) === "closed").length)
}

function renderRisks(items){
riskCache = items
renderSummary(items)

if(!items.length){
riskTableBody.innerHTML = `<tr><td colspan="9">No risks logged yet.</td></tr>`
return
}

riskTableBody.innerHTML = items.map(item => {
const rowStatus = uiStatus(item.status)
const primaryAction = rowStatus === "open"
? `<button onclick="advanceRisk(${item.id})">Mitigate</button>`
: rowStatus === "mitigating"
? `<button onclick="closeRisk(${item.id})">Close</button>`
: ""

return `
<tr data-status="${rowStatus}">
<td>RISK-${item.id}</td>
<td>${item.title}</td>
<td>${item.hazard_type || "-"}</td>
<td><span class="level-pill ${levelClass(item.priority)}">${levelLabel(item.priority)}</span></td>
<td><span class="status-pill ${rowStatus}">${statusLabel(item.status)}</span></td>
<td><span class="owner-pill">${item.assigned_to || item.created_by || "Unassigned"}</span></td>
<td>${item.description || "-"}</td>
<td>${formatDeadline(item.deadline)}</td>
<td class="row-actions">
${primaryAction}
<button onclick="viewRisk(${item.id})">View</button>
</td>
</tr>
`
}).join("")

applyRiskFilters()
}

async function loadRisks(){
try {
const response = await fetch("/api/tasks", { headers: riskHeaders() })
if(!response.ok){
throw new Error("Unable to load risks")
}
const risks = await response.json()
renderRisks(risks)
} catch(error){
setRiskStatus(error.message)
}
}

function applyRiskFilters(){
const term = riskSearch.value.trim().toLowerCase()
const rows = Array.from(riskTableBody.querySelectorAll("tr"))

rows.forEach(row => {
const rowStatus = row.getAttribute("data-status")
const rowText = row.textContent.toLowerCase()
const matchesStatus = activeRiskFilter === "all" || rowStatus === activeRiskFilter
const matchesText = term === "" || rowText.includes(term)
row.style.display = matchesStatus && matchesText ? "table-row" : "none"
})
}

async function addRisk(){
const title = prompt("Risk title:")
if(!title) return
const hazardType = prompt("Risk category:", "Operational Safety") || ""
const priority = prompt("Priority (low, medium, high, critical):", "medium") || "medium"
const description = prompt("Mitigation / notes:", "") || ""
const deadline = prompt("Review date (YYYY-MM-DD):", "") || ""

try {
const response = await fetch("/api/tasks", {
method: "POST",
headers: riskHeaders(),
body: JSON.stringify({
title,
hazard_type: hazardType,
priority,
description,
deadline: deadline ? `${deadline}T00:00:00` : null
})
})
if(!response.ok){
const errorText = await response.text()
throw new Error(errorText || "Unable to create risk")
}
setRiskStatus("Risk created.")
await loadRisks()
} catch(error){
setRiskStatus(error.message)
}
}

function viewRisk(taskId){
const item = riskCache.find(risk => risk.id === taskId)
if(!item) return
setRiskStatus(`${item.title} | ${item.description || "No extra notes"} | Owner: ${item.assigned_to || item.created_by || "Unassigned"}`)
}

async function advanceRisk(taskId){
try {
const response = await fetch(`/api/tasks/${taskId}/status`, {
method: "PUT",
headers: riskHeaders(),
body: JSON.stringify({ status: "in_progress", proof_notes: "" })
})
if(!response.ok){
const errorText = await response.text()
throw new Error(errorText || "Unable to update risk")
}
setRiskStatus("Risk moved into mitigation.")
await loadRisks()
} catch(error){
setRiskStatus(error.message)
}
}

async function closeRisk(taskId){
const proofNotes = prompt("Closure notes:", "") || ""
try {
const response = await fetch(`/api/tasks/${taskId}/status`, {
method: "PUT",
headers: riskHeaders(),
body: JSON.stringify({ status: "closed", proof_notes: proofNotes })
})
if(!response.ok){
const errorText = await response.text()
throw new Error(errorText || "Unable to close risk")
}
setRiskStatus("Risk closed.")
await loadRisks()
} catch(error){
setRiskStatus(error.message)
}
}

function setRiskStatus(message){
document.getElementById("riskStatus").textContent = message
}

document.querySelectorAll(".risk-filters button").forEach(button => {
button.addEventListener("click", function(){
document.querySelectorAll(".risk-filters button").forEach(btn => btn.classList.remove("active"))
this.classList.add("active")
activeRiskFilter = this.getAttribute("data-filter")
applyRiskFilters()
})
})

riskSearch.addEventListener("input", applyRiskFilters)
loadRisks()
</script>

<script src="../js/main.js"></script>

</body>
</html>
