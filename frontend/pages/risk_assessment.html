<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Risk Assessment</title>

<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="../js/auth.js"></script>

</head>

<body class="bg-gray-100">

<script>checkAuth();</script>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>


<!-- MAIN CONTENT -->
<main class="main-content p-10">

<h1 class="text-3xl font-bold mb-6">Risk Assessment</h1>

<p class="text-gray-600 mb-8">
Assess risks for your AI model or system.
</p>


<!-- INPUT FORM -->
<div class="bg-white p-8 rounded-xl shadow max-w-xl">

<label class="block mb-2 font-semibold">Project Name</label>

<input
id="project"
class="w-full border p-2 rounded mb-4"
placeholder="Enter project name"
/>

<label class="block mb-2 font-semibold">Model Name</label>

<input
id="model"
class="w-full border p-2 rounded mb-4"
placeholder="Enter model"
/>

<label class="block mb-2 font-semibold">Risk Category</label>

<select id="riskType" class="w-full border p-2 rounded mb-4">

<option>Data Privacy</option>
<option>Model Bias</option>
<option>Security</option>
<option>Safety</option>

</select>

<button
onclick="assessRisk()"
class="bg-red-600 text-white px-6 py-3 rounded hover:bg-red-700"
>
Assess Risk
</button>

</div>


<!-- RESULT -->
<div id="result" class="mt-10 hidden">

<h2 class="text-xl font-bold mb-4">Risk Result</h2>

<div class="bg-white p-6 rounded shadow max-w-xl">

<p><b>Project:</b> <span id="outProject"></span></p>
<p><b>Model:</b> <span id="outModel"></span></p>
<p><b>Risk Category:</b> <span id="outType"></span></p>

<p class="mt-4 font-bold text-red-600 text-lg">
Risk Score: <span id="riskScore"></span>
</p>

</div>

</div>

</main>


<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize Search AFTER sidebar/navbar loads */
initSearch()

/* Sidebar Toggle Logic */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const mainContent = document.querySelector(".main-content")
const navbar = document.querySelector(".navbar")

if(toggleBtn && sidebar){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(mainContent){
mainContent.classList.toggle("expanded")
}

if(navbar){
navbar.classList.toggle("expanded")
}

}

}

})
/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

</script>


<!-- RISK ASSESSMENT -->
<script>

function assessRisk(){

const project = document.getElementById("project").value;
const model = document.getElementById("model").value;
const type = document.getElementById("riskType").value;

document.getElementById("outProject").innerText = project;
document.getElementById("outModel").innerText = model;
document.getElementById("outType").innerText = type;

const score = Math.floor(Math.random()*100);

document.getElementById("riskScore").innerText = score + "%";

document.getElementById("result").classList.remove("hidden");

}

</script>


<!-- AI CHAT SCRIPT -->
<script>

function toggleChat(){

let chat=document.getElementById("aiChat")
chat.classList.toggle("open")

}

function sendChat(){

let input=document.getElementById("chatInput")
let text=input.value.trim()

if(text==="") return

addChat(text,"user-msg")

let reply=generateReply(text)

setTimeout(()=>{
addChat(reply,"ai-msg")
},400)

input.value=""

}

function addChat(text,type){

let box=document.getElementById("chatMessages")

let div=document.createElement("div")

div.className=type
div.innerText=text

box.appendChild(div)

box.scrollTop=box.scrollHeight

}

function generateReply(q){

q=q.toLowerCase()

if(q.includes("hazard"))
return "Common hazards include slips, falls, electrical risks, and unsafe machinery."

if(q.includes("helmet"))
return "Workers must always wear PPE like helmets, gloves, and safety shoes."

if(q.includes("accident"))
return "Reduce accidents by conducting safety audits and enforcing PPE."

return "Safety tip: Always inspect equipment before starting work."

}

document.getElementById("chatInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendChat()
}

})

</script>


<!-- REQUIRED FOR SIDEBAR -->
<script src="../js/main.js"></script>

</body>
</html>
