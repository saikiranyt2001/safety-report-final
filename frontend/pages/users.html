<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
--bg-1: #f1f7ff;
--bg-2: #e4f4ef;
--panel: rgba(255, 255, 255, 0.82);
--panel-strong: #ffffff;
--text: #102a43;
--muted: #52606d;
--primary: #0b7285;
--warn: #d9480f;
--border: rgba(16, 42, 67, 0.08);
--shadow: 0 18px 45px rgba(11, 114, 133, 0.12);
}

* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: "Space Grotesk", sans-serif;
color: var(--text);
background:
radial-gradient(circle at 10% 10%, rgba(47, 158, 68, 0.18), transparent 30%),
radial-gradient(circle at 90% 15%, rgba(11, 114, 133, 0.17), transparent 28%),
linear-gradient(135deg, var(--bg-1), var(--bg-2));
min-height: 100vh;
}

.main-content {
max-width: 1080px;
margin: 2rem 2rem 2rem 270px;
padding: 2rem;
border: 1px solid var(--border);
border-radius: 24px;
background: var(--panel);
backdrop-filter: blur(4px);
box-shadow: var(--shadow);
}

.main-content.expanded {
margin-left: 100px;
}

.users-header {
display: flex;
align-items: end;
justify-content: space-between;
gap: 1rem;
margin-bottom: 1.3rem;
}

.page-title {
margin: 0;
font-size: clamp(1.8rem, 4vw, 2.6rem);
letter-spacing: -0.03em;
}

.users-subtitle {
margin: 0.35rem 0 0;
color: var(--muted);
font-size: 0.98rem;
}

.header-badge {
background: linear-gradient(135deg, #d3f9d8, #99e9f2);
color: #0c3f53;
border: 1px solid rgba(12, 63, 83, 0.2);
border-radius: 999px;
padding: 0.45rem 0.9rem;
font-size: 0.82rem;
font-weight: 600;
white-space: nowrap;
}

.users-card {
border: 1px solid var(--border);
border-radius: 18px;
padding: 1.1rem;
background: var(--panel-strong);
box-shadow: 0 6px 20px rgba(16, 42, 67, 0.06);
}

.users-toolbar {
display: flex;
justify-content: space-between;
align-items: center;
flex-wrap: wrap;
gap: 10px;
margin: 4px 0 16px;
}

.users-search {
padding: 10px 12px;
border: 1px solid var(--border);
border-radius: 10px;
min-width: 260px;
background: #f8fbfd;
font-family: "Space Grotesk", sans-serif;
}

.users-actions {
display: flex;
gap: 8px;
}

.users-actions button {
padding: 10px 14px;
border: 1px solid rgba(217, 72, 15, 0.25);
border-radius: 10px;
background: #fff;
color: #9a3412;
font-family: "Space Grotesk", sans-serif;
font-weight: 600;
cursor: pointer;
}

.users-actions .primary {
background: linear-gradient(120deg, #0b7285, #2f9e44);
border: none;
color: #fff;
box-shadow: 0 12px 24px rgba(11, 114, 133, 0.24);
}

.users-table-wrap {
background: #fff;
border: 1px solid var(--border);
border-radius: 12px;
overflow: auto;
}

.users-table {
width: 100%;
border-collapse: collapse;
min-width: 820px;
}

.users-table th,
.users-table td {
padding: 12px;
text-align: left;
border-bottom: 1px solid #eef3f8;
font-size: 14px;
}

.users-table th {
background: #f8fbff;
font-weight: 700;
}

.role-pill {
display: inline-block;
padding: 4px 8px;
border-radius: 999px;
font-size: 12px;
font-weight: 700;
}

.role-pill.admin {
background: #e8f0fe;
color: #174ea6;
}

.role-pill.manager {
background: #fff4e5;
color: #8c5d00;
}

.role-pill.viewer {
background: #e9f7ef;
color: #146c43;
}

.status-pill {
display: inline-block;
padding: 4px 8px;
border-radius: 999px;
font-size: 12px;
font-weight: 700;
}

.status-pill.active {
background: #e9f7ef;
color: #146c43;
}

.status-pill.inactive {
background: #fdecea;
color: #b3261e;
}

.row-actions button {
padding: 6px 10px;
margin-right: 6px;
border: 1px solid #d0d7de;
border-radius: 8px;
background: #fff;
color: #374151;
font-family: "Space Grotesk", sans-serif;
cursor: pointer;
}

.row-actions button:hover {
background: #f8fafc;
}

.status-note {
margin-top: 12px;
font-size: 14px;
min-height: 20px;
color: #1e6f43;
}

.status-note.error {
color: var(--warn);
}

.status-note.success {
color: #1e6f43;
}

@media (max-width: 680px) {
.main-content {
margin: 1rem;
padding: 1.2rem;
border-radius: 18px;
}

.users-header {
align-items: flex-start;
flex-direction: column;
}
}
</style>

</head>

<body>

<div id="sidebar-container"></div>

<div class="main-content">

<div class="users-header">
<div>
<h1 class="page-title">Users</h1>
<p class="users-subtitle">Manage team access, roles, and account status.</p>
</div>
<span class="header-badge">Access Control Center</span>
</div>

<div class="users-card">

<div class="users-toolbar">
<input id="userSearch" class="users-search" type="text" placeholder="Search users by name, email, or role...">
<div class="users-actions">
<button class="primary" onclick="addSampleUser()">Add User</button>
<button onclick="exportUsers()">Export CSV</button>
</div>
</div>

<div class="users-table-wrap">
<table class="users-table" id="usersTable">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Status</th>
<th>Last Login</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
</div>

<div class="status-note" id="usersStatus"></div>

</div>

</div>

<div id="footer"></div>

<script>
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {
document.getElementById("sidebar-container").innerHTML = data

initSearch()

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){
toggleBtn.onclick = function(){
sidebar.classList.toggle("collapsed")
if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")
const footer = document.querySelector(".footer")
if(footer){
footer.classList.toggle("expanded")
}
}
}
})

fetch("../components/footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer").innerHTML = data
})

if(!(localStorage.getItem("auth_token") || localStorage.getItem("token") || localStorage.getItem("access_token"))){
window.location.href = "login.html"
}

function logout(){
localStorage.removeItem("auth_token")
localStorage.removeItem("token")
localStorage.removeItem("access_token")
window.location.href = "login.html"
}

const userSearch = document.getElementById("userSearch")
const usersTableBody = document.querySelector("#usersTable tbody")
let usersCache = []

function isLikelyJwt(token){
return !!token && token !== "loggedin" && token.split(".").length === 3
}

function resolveUsersToken(){
const candidates = [
localStorage.getItem("auth_token"),
localStorage.getItem("token"),
localStorage.getItem("access_token")
]

const valid = candidates.find(isLikelyJwt) || null
if(valid){
localStorage.setItem("auth_token", valid)
localStorage.setItem("token", valid)
localStorage.setItem("access_token", valid)
}

return valid
}

function handleUnauthorized(){
localStorage.removeItem("auth_token")
localStorage.removeItem("token")
localStorage.removeItem("access_token")
window.location.href = "login.html"
}

async function parseApiError(response, fallback){
let raw = ""
try {
raw = await response.text()
} catch (_error) {
raw = ""
}

if(!raw){
return fallback
}

try {
const parsed = JSON.parse(raw)
return parsed.detail || fallback
} catch (_error) {
return raw
}
}

function apiHeaders(){
const usersToken = resolveUsersToken()

if(!usersToken){
handleUnauthorized()
throw new Error("Session expired. Please log in again.")
}

return {
"Content-Type": "application/json",
"Authorization": "Bearer " + usersToken
}
}

function rolePillClass(role){
const normalized = (role || "").toLowerCase()
if(normalized === "admin") return "admin"
if(normalized === "manager") return "manager"
return "viewer"
}

function roleLabel(role){
const normalized = (role || "").toLowerCase()
if(normalized === "worker") return "Worker"
return normalized.charAt(0).toUpperCase() + normalized.slice(1)
}

function formatLastLogin(value){
if(!value) return "-"
return new Date(value).toLocaleString()
}

function toEmail(username){
return `${username}@safety.ai`
}

function renderUsers(items){
usersCache = items
usersTableBody.innerHTML = items.map(user => `
<tr data-id="${user.id}">
<td>${user.username}</td>
<td>${toEmail(user.username)}</td>
<td><span class="role-pill ${rolePillClass(user.role)}">${roleLabel(user.role)}</span></td>
<td><span class="status-pill ${user.is_active ? "active" : "inactive"}">${user.is_active ? "Active" : "Inactive"}</span></td>
<td>${formatLastLogin(user.last_activity)}</td>
<td class="row-actions">
<button onclick="deleteUser(${user.id})">Delete</button>
<button onclick="editUser(${user.id})">Edit</button>
<button onclick="toggleUserStatus(${user.id})">${user.is_active ? "Deactivate" : "Activate"}</button>
</td>
</tr>
`).join("")

if(!items.length){
usersTableBody.innerHTML = `<tr><td colspan="6">No users found.</td></tr>`
}

filterUsers()
}

async function loadUsers(){
try {
const response = await fetch("/api/admin/users", { headers: apiHeaders() })
if(!response.ok){
if(response.status === 401){
handleUnauthorized()
return
}
const detail = await parseApiError(response, "Unable to load users")
throw new Error(detail)
}
const users = await response.json()
renderUsers(users)
} catch(error){
setStatusMessage(error.message)
}
}

function filterUsers(){
const term = userSearch.value.trim().toLowerCase()
const rows = Array.from(usersTableBody.querySelectorAll("tr"))

rows.forEach(row => {
const text = row.textContent.toLowerCase()
row.style.display = term === "" || text.includes(term) ? "table-row" : "none"
})
}

async function editUser(userId){
const target = usersCache.find(item => item.id === userId)
if(!target) return

const nextUsername = prompt("Update username:", target.username)
if(!nextUsername){
return
}

const nextRole = prompt("Update role (admin, manager, worker):", target.role)
if(!nextRole){
return
}

try {
const response = await fetch(`/api/admin/users/${userId}`, {
method: "PUT",
headers: apiHeaders(),
body: JSON.stringify({
username: nextUsername,
role: nextRole
})
})
if(!response.ok){
if(response.status === 401){
handleUnauthorized()
return
}
const detail = await parseApiError(response, "Unable to update user")
throw new Error(detail)
}
setStatusMessage("User updated.")
await loadUsers()
} catch(error){
setStatusMessage(error.message)
}
}

async function addSampleUser(){
const username = prompt("Username for the new user:")
if(!username){
return
}

const password = prompt("Temporary password:")
if(!password){
return
}

const role = prompt("Role (admin, manager, worker):", "worker") || "worker"

try {
const response = await fetch("/api/admin/users", {
method: "POST",
headers: apiHeaders(),
body: JSON.stringify({ username, password, role })
})
if(!response.ok){
if(response.status === 401){
handleUnauthorized()
return
}
const detail = await parseApiError(response, "Unable to create user")
throw new Error(detail)
}
setStatusMessage("User created.")
await loadUsers()
} catch(error){
setStatusMessage(error.message)
}
}

async function deleteUser(userId){
if(!confirm("Delete this user?")){
return
}

try {
const response = await fetch(`/api/admin/users/${userId}`, {
method: "DELETE",
headers: apiHeaders()
})
if(!response.ok){
if(response.status === 401){
handleUnauthorized()
return
}
const detail = await parseApiError(response, "Unable to delete user")
throw new Error(detail)
}
setStatusMessage("User deleted.")
await loadUsers()
} catch(error){
setStatusMessage(error.message)
}
}

async function toggleUserStatus(userId){
const target = usersCache.find(item => item.id === userId)
if(!target){
return
}

const nextActiveState = !target.is_active
const actionLabel = nextActiveState ? "activate" : "deactivate"
if(!confirm(`Do you want to ${actionLabel} ${target.username}?`)){
return
}

try {
const response = await fetch(`/api/admin/users/${userId}/status`, {
method: "PUT",
headers: apiHeaders(),
body: JSON.stringify({ is_active: nextActiveState })
})
if(!response.ok){
if(response.status === 401){
handleUnauthorized()
return
}
const detail = await parseApiError(response, `Unable to ${actionLabel} user`)
throw new Error(detail)
}
setStatusMessage(`User ${nextActiveState ? "activated" : "deactivated"}.`)
await loadUsers()
} catch(error){
setStatusMessage(error.message)
}
}

function exportUsers(){
const rows = Array.from(usersTableBody.querySelectorAll("tr"))
const header = ["Name", "Email", "Role", "Status", "Last Login"]
const data = rows
.filter(row => row.style.display !== "none")
.map(row => {
const cells = row.querySelectorAll("td")
return [
cleanCsvValue(cells[0].textContent),
cleanCsvValue(cells[1].textContent),
cleanCsvValue(cells[2].textContent),
cleanCsvValue(cells[3].textContent),
cleanCsvValue(cells[4].textContent)
]
})

const csvRows = [header, ...data].map(cols => cols.join(",")).join("\n")
const blob = new Blob([csvRows], { type: "text/csv;charset=utf-8;" })
const url = URL.createObjectURL(blob)
const link = document.createElement("a")
link.href = url
link.download = "users_export.csv"
link.click()
URL.revokeObjectURL(url)
setStatusMessage("Users exported as CSV.")
}

function cleanCsvValue(value){
const escaped = value.trim().replace(/"/g, "\"\"")
return "\"" + escaped + "\""
}

function setStatusMessage(message){
const status = document.getElementById("usersStatus")
status.textContent = message
status.className = "status-note"

if(!message){
return
}

const lowered = String(message).toLowerCase()
if(lowered.includes("unable") || lowered.includes("failed") || lowered.includes("error")){
status.classList.add("error")
return
}

status.classList.add("success")
}

userSearch.addEventListener("input", filterUsers)
loadUsers()
</script>

<script src="../js/main.js"></script>

</body>
</html>
