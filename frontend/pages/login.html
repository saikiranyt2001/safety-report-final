<!DOCTYPE html>
<html>
<head>
<title>Login - AI Safety Platform</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet" href="../css/style.css">

<style>
body{
background:#f5f7fb !important;
opacity:1 !important;
filter:none !important;
}

.layout,
.main-content,
.overlay,
.modal-backdrop{
display:none !important;
}

.login-container{
max-width:420px;
margin:120px auto;
}

.login-card{
background:#ffffff;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.login-card input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

.login-card button{
width:100%;
padding:10px;
margin-top:15px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}
</style>

</head>

<body>

<div class="login-container">

<h1>AI Safety Platform</h1>

<div class="login-card">

<h2>Login</h2>

<input id="username" type="text" placeholder="Username">

<input id="company" type="text" placeholder="Company / workspace name (for signup)">

<input id="password" type="password" placeholder="Password">

<p id="auth-message" style="min-height:20px;color:#b42318;font-size:14px;"></p>

<button onclick="login()">Login</button>
<button onclick="signup()" style="margin-top:10px;background:#0f766e;">Create Workspace Account</button>

</div>

</div>

<script>

function setMessage(message, isError = true){
const el = document.getElementById("auth-message")
el.textContent = message
el.style.color = isError ? "#b42318" : "#166534"
}

function persistSession(data){
const role = data.role || "worker"
const token = data.access_token
const company = data.company || {}

localStorage.setItem("auth_token", token)
localStorage.setItem("token", access_token)
localStorage.setItem("username", data.username)
localStorage.setItem("user_name", data.username)
localStorage.setItem("user_role", role)
localStorage.setItem("company_id", String(company.id || ""))
localStorage.setItem("company_name", company.name || "")
localStorage.setItem("user", JSON.stringify({
username: data.username,
role: role,
company_id: company.id || null,
company_name: company.name || ""
}))
}

async function requestAuth(url, payload){
const res = await fetch(url, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(payload)
})

const data = await res.json().catch(() => ({}))
if(!res.ok){
throw new Error(data.detail || "Authentication failed")
}
return data
}

async function login(){

const username = document.getElementById("username").value.trim() || "worker";
const password = document.getElementById("password").value;

if(!password){
setMessage("Enter your password.")
return
}

try {
setMessage("Signing in...", false)
const data = await requestAuth("/api/login", { username, password })
persistSession(data)
window.location.href="../pages/dashboard.html"
} catch(error) {
setMessage(error.message || "Login failed")
}

}

async function signup(){

const username = document.getElementById("username").value.trim() || "worker";
const companyName = document.getElementById("company").value.trim();
const password = document.getElementById("password").value;

if(!password){
setMessage("Enter a password before creating an account.")
return
}

try {
setMessage("Creating workspace account...", false)
await requestAuth("/api/signup", {
username,
password,
company_name: companyName || undefined
})
const data = await requestAuth("/api/login", { username, password })
persistSession(data)
window.location.href="../pages/dashboard.html"
} catch(error) {
setMessage(error.message || "Signup failed")
}

}

</script>

</body>
</html>
