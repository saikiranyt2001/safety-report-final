<!DOCTYPE html>
<html>
<head>
<title>Login - AI Safety Platform</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="login-container">

<h1>AI Safety Platform</h1>

}

</script>

</html>
