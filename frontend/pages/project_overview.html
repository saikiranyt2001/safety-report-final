<!DOCTYPE html>
<html>
<head>

<title>Project Overview</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<div class="logo">AI Safety Platform</div>

<div class="nav-right">
<span>Admin</span>
<button onclick="logout()">Logout</button>
</div>

</div>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>


<!-- MAIN CONTENT -->
<div class="main-content">

<h1>Project Overview</h1>


<div class="overview">

<div class="overview-box">

<h2>Project Information</h2>

<p><strong>Project Name:</strong> <span id="projectName">Loading...</span></p>
<p><strong>Location:</strong> <span id="projectLocation">-</span></p>
<p><strong>Manager:</strong> <span id="projectManager">-</span></p>
<p><strong>Start Date:</strong> <span id="projectStartDate">-</span></p>

</div>


<div class="overview-box">

<h2>Project Status</h2>

<p>Safety Score: <span id="projectSafetyScore">-</span></p>
<p>Active Hazards: <span id="projectHazards">-</span></p>
<p>Reports Generated: <span id="projectReports">-</span></p>
<p>Risk Alerts: <span id="projectRiskAlerts">-</span></p>

</div>


<div class="overview-box">

<h2>Recent Activity</h2>

<ul id="projectActivity">
<li>Loading activity...</li>
</ul>

</div>

</div>

</div>


<!-- FOOTER -->
<div id="footer"></div>


<!-- LOAD SIDEBAR -->
<script>

fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize search */
initSearch()

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})

</script>


<!-- LOAD FOOTER -->
<script>

fetch("../components/footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer").innerHTML = data
})

</script>


<!-- AUTH -->
<script>

if(!(localStorage.getItem("auth_token") || localStorage.getItem("token") || localStorage.getItem("access_token"))){
window.location.href="login.html";
}

function logout(){
localStorage.removeItem("auth_token");
localStorage.removeItem("token");
localStorage.removeItem("access_token");
window.location.href="login.html";
}

</script>

<script src="../js/main.js"></script>
<script>
const projectToken = localStorage.getItem("auth_token") || localStorage.getItem("token") || localStorage.getItem("access_token")

function projectHeaders() {
return {
"Authorization": "Bearer " + projectToken
}
}

function fmtDate(value) {
if(!value) return "-"
return new Date(value).toLocaleDateString()
}

async function loadProjectOverview() {
try {
const [projectsRes, reportsRes, activityRes] = await Promise.all([
fetch("/api/projects", { headers: projectHeaders() }),
fetch("/api/reports", { headers: projectHeaders() }),
fetch("/api/activity-logs?limit=10", { headers: projectHeaders() }),
])

if(!projectsRes.ok){
throw new Error("Unable to load project overview")
}

const projects = await projectsRes.json()
const reports = reportsRes.ok ? await reportsRes.json() : []
const activity = activityRes.ok ? await activityRes.json() : []
const project = projects[0]

if(!project){
document.getElementById("projectName").textContent = "No project created yet"
document.getElementById("projectActivity").innerHTML = "<li>Create a project to see details here.</li>"
return
}

document.getElementById("projectName").textContent = project.name
document.getElementById("projectLocation").textContent = project.location || "-"
document.getElementById("projectManager").textContent = localStorage.getItem("username") || "Admin"
document.getElementById("projectStartDate").textContent = fmtDate(project.created_at)

const scoreRes = await fetch(`/api/projects/${project.id}/safety-score`, { headers: projectHeaders() })
const score = scoreRes.ok ? await scoreRes.json() : null
const projectReports = reports.filter(item => item.project_id === project.id)
const alerts = projectReports.filter(item => (item.risk_level || "").toLowerCase() === "high" || (item.risk_level || "").toLowerCase() === "critical")

document.getElementById("projectSafetyScore").textContent = score ? `${score.score}/100 (${score.risk_level})` : "-"
document.getElementById("projectHazards").textContent = score ? score.hazards : projectReports.length
document.getElementById("projectReports").textContent = projectReports.length
document.getElementById("projectRiskAlerts").textContent = alerts.length

const activityItems = activity.slice(0, 5).map(item => `<li>${item.action}${item.details ? ` - ${item.details}` : ""}</li>`)
document.getElementById("projectActivity").innerHTML = activityItems.length ? activityItems.join("") : "<li>No recent activity.</li>"
} catch(error) {
document.getElementById("projectName").textContent = "Unable to load overview"
document.getElementById("projectActivity").innerHTML = `<li>${error.message}</li>`
}
}

loadProjectOverview()
</script>

</body>
</html>
