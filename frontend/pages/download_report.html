<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download Report</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
	--bg-1: #f1f7ff;
	--bg-2: #e4f4ef;
	--panel: rgba(255, 255, 255, 0.82);
	--panel-strong: #ffffff;
	--text: #102a43;
	--muted: #52606d;
	--primary: #0b7285;
	--warn: #d9480f;
	--border: rgba(16, 42, 67, 0.08);
	--shadow: 0 18px 45px rgba(11, 114, 133, 0.12);
}

* {
	box-sizing: border-box;
}

body {
	margin: 0;
	font-family: "Space Grotesk", sans-serif;
	color: var(--text);
	background:
		radial-gradient(circle at 10% 10%, rgba(47, 158, 68, 0.18), transparent 30%),
		radial-gradient(circle at 90% 15%, rgba(11, 114, 133, 0.17), transparent 28%),
		linear-gradient(135deg, var(--bg-1), var(--bg-2));
	min-height: 100vh;
}

.main-content {
	max-width: 1080px;
	margin: 2rem auto;
	padding: 2rem;
	border: 1px solid var(--border);
	border-radius: 24px;
	background: var(--panel);
	backdrop-filter: blur(4px);
	box-shadow: var(--shadow);
}

.download-header {
	display: flex;
	align-items: end;
	justify-content: space-between;
	gap: 1rem;
	margin-bottom: 1.3rem;
}

.page-title {
	margin: 0;
	font-size: clamp(1.8rem, 4vw, 2.6rem);
	letter-spacing: -0.03em;
}

.download-subtitle {
	margin: 0.35rem 0 0;
	color: var(--muted);
	font-size: 0.98rem;
}

.header-badge {
	background: linear-gradient(135deg, #d3f9d8, #99e9f2);
	color: #0c3f53;
	border: 1px solid rgba(12, 63, 83, 0.2);
	border-radius: 999px;
	padding: 0.45rem 0.9rem;
	font-size: 0.82rem;
	font-weight: 600;
	white-space: nowrap;
}

.download-card {
	border: 1px solid var(--border);
	border-radius: 18px;
	padding: 1.1rem;
	background: var(--panel-strong);
	box-shadow: 0 6px 20px rgba(16, 42, 67, 0.06);
}

.download-card label {
	display: block;
	font-size: 0.92rem;
	font-weight: 600;
	margin-bottom: 0.45rem;
	color: #234;
}

#reportId {
	width: 100%;
	padding: 0.62rem 0.68rem;
	border: 1px solid var(--border);
	border-radius: 10px;
	background: #f8fbfd;
	font-family: "Space Grotesk", sans-serif;
	font-size: 0.95rem;
}

.download-card br {
	display: none;
}

.detect-btn,
.primary-btn {
	border: 0;
	border-radius: 12px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.72rem 1rem;
	margin-top: 0.9rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	cursor: pointer;
	box-shadow: 0 12px 24px rgba(11, 114, 133, 0.24);
}

.result {
	margin-top: 1rem;
	border: 1px solid rgba(16, 42, 67, 0.1);
	background: linear-gradient(90deg, #f8fbfd, #edf8f2);
	border-radius: 12px;
	padding: 0.9rem;
	font-size: 0.95rem;
}

.chat-toggle-btn {
	border: 0;
	border-radius: 999px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.7rem 1rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	box-shadow: 0 12px 24px rgba(11, 114, 133, 0.25);
}

.ai-chat-sidebar {
	border-radius: 16px 16px 0 0;
	overflow: hidden;
}

.chat-header,
.chat-input button {
	font-family: "Space Grotesk", sans-serif;
}

@media (max-width: 680px) {
	.main-content {
		margin: 1rem;
		padding: 1.2rem;
		border-radius: 18px;
	}

	.download-header {
		align-items: flex-start;
		flex-direction: column;
	}
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>


<!-- MAIN CONTENT -->
<main class="main-content">

<div class="download-header">
<div>
<h1 class="page-title">Download Report</h1>
<p class="download-subtitle">Enter a report ID to download the generated safety report.</p>
</div>
<span class="header-badge">Archive Access Enabled</span>
</div>

<div class="download-card">

<label>Report ID</label>

<input
type="text"
id="reportId"
placeholder="Enter report ID"
>

<br><br>

<button class="detect-btn" onclick="downloadReport()">
Download Report
</button>

<div class="result" id="resultBox">
Download status will appear here.
</div>

</div>

</main>


<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */

fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize search */
initSearch()

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})

/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

</script>

<script src="../js/main.js"></script>


<!-- DOWNLOAD REPORT -->
<script>
wireBackendChat()

function downloadReport(){

let id=document.getElementById("reportId").value

if(id.trim()===""){
alert("Please enter a report ID")
return
}

const url = `/api/download-report/${encodeURIComponent(id)}`

fetch(url, {
headers: {
"Authorization": "Bearer " + (getStoredToken() || "")
}
})
.then(async res => {
if(!res.ok){
const errorText = await res.text()
throw new Error(errorText || "Report download failed")
}
document.getElementById("resultBox").innerHTML=
`
<h3>Download Ready</h3>
<p>Report ID <b>${id}</b> is available.</p>
<a class="primary-btn" href="${url}" target="_blank">Download PDF</a>
`
})
.catch(error => {
document.getElementById("resultBox").innerHTML = `<p>${error.message}</p>`
})

}

</script>

</body>
</html>
