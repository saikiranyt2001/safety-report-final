<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report History</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
	--bg-1: #f1f7ff;
	--bg-2: #e4f4ef;
	--panel: rgba(255, 255, 255, 0.82);
	--panel-strong: #ffffff;
	--text: #102a43;
	--muted: #52606d;
	--primary: #0b7285;
	--warn: #d9480f;
	--border: rgba(16, 42, 67, 0.08);
	--shadow: 0 18px 45px rgba(11, 114, 133, 0.12);
}

* {
	box-sizing: border-box;
}

body {
	margin: 0;
	font-family: "Space Grotesk", sans-serif;
	color: var(--text);
	background:
		radial-gradient(circle at 10% 10%, rgba(47, 158, 68, 0.18), transparent 30%),
		radial-gradient(circle at 90% 15%, rgba(11, 114, 133, 0.17), transparent 28%),
		linear-gradient(135deg, var(--bg-1), var(--bg-2));
	min-height: 100vh;
}

.layout {
	max-width: 1180px;
	margin: 2rem auto;
	padding: 0 1rem;
}

.main-content {
	border: 1px solid var(--border);
	border-radius: 24px;
	background: var(--panel);
	backdrop-filter: blur(4px);
	box-shadow: var(--shadow);
	padding: 2rem;
}

.page-title {
	margin: 0;
	font-size: clamp(1.8rem, 4vw, 2.6rem);
	letter-spacing: -0.03em;
}

.page-subtitle {
	margin: 0.35rem 0 1rem;
	color: var(--muted);
	font-size: 0.98rem;
}

.container-rep-history {
	border: 1px solid var(--border);
	border-radius: 18px;
	padding: 0.4rem;
	background: var(--panel-strong);
	box-shadow: 0 6px 20px rgba(16, 42, 67, 0.06);
	overflow-x: auto;
}

.table {
	width: 100%;
	border-collapse: collapse;
	min-width: 760px;
}

.table th,
.table td {
	padding: 0.8rem 0.7rem;
	text-align: left;
	border-bottom: 1px solid rgba(16, 42, 67, 0.08);
	font-size: 0.92rem;
}

.table th {
	font-size: 0.8rem;
	letter-spacing: 0.04em;
	text-transform: uppercase;
	color: var(--muted);
	background: linear-gradient(180deg, #f8fbfd, #f3f8ff);
}

.badge {
	display: inline-block;
	padding: 0.26rem 0.62rem;
	border-radius: 999px;
	font-size: 0.78rem;
	font-weight: 700;
	border: 1px solid transparent;
}

.badge.high {
	background: #ffe3e3;
	color: #9b2226;
	border-color: #ffc9c9;
}

.badge.medium {
	background: #fff3bf;
	color: #7c4d00;
	border-color: #ffe066;
}

.badge.low {
	background: #d3f9d8;
	color: #14532d;
	border-color: #b2f2bb;
}

.primary-btn {
	border: 0;
	border-radius: 10px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.45rem 0.8rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	cursor: pointer;
	box-shadow: 0 10px 20px rgba(11, 114, 133, 0.22);
}

.secondary-btn {
	border: 1px solid rgba(11, 114, 133, 0.2);
	border-radius: 10px;
	background: #fff;
	color: var(--primary);
	padding: 0.45rem 0.8rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	cursor: pointer;
}

.action-group {
	display: flex;
	gap: 0.55rem;
	flex-wrap: wrap;
}

.report-modal {
	position: fixed;
	inset: 0;
	background: rgba(16, 42, 67, 0.55);
	display: none;
	align-items: center;
	justify-content: center;
	padding: 1rem;
	z-index: 1200;
}

.report-modal.open {
	display: flex;
}

.report-modal-card {
	width: min(720px, 100%);
	max-height: 85vh;
	overflow: auto;
	border-radius: 20px;
	background: #fff;
	padding: 1.4rem;
	box-shadow: 0 24px 50px rgba(16, 42, 67, 0.25);
}

.report-modal-header {
	display: flex;
	align-items: start;
	justify-content: space-between;
	gap: 1rem;
	margin-bottom: 1rem;
}

.report-modal-title {
	margin: 0;
	font-size: 1.4rem;
}

.report-modal-close {
	border: 0;
	background: transparent;
	font-size: 1.6rem;
	cursor: pointer;
	color: var(--muted);
}

.report-detail-grid {
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
	gap: 0.75rem;
	margin-bottom: 1rem;
}

.report-detail-card {
	border: 1px solid var(--border);
	border-radius: 14px;
	padding: 0.9rem;
	background: linear-gradient(180deg, #f8fbfd, #f3f8ff);
}

.report-detail-label {
	display: block;
	font-size: 0.75rem;
	font-weight: 700;
	color: var(--muted);
	text-transform: uppercase;
	letter-spacing: 0.04em;
	margin-bottom: 0.35rem;
}

.report-content-box {
	border: 1px solid var(--border);
	border-radius: 14px;
	padding: 1rem;
	background: #fbfdff;
	white-space: pre-wrap;
	line-height: 1.6;
}

.chat-toggle-btn {
	border: 0;
	border-radius: 999px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.7rem 1rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	box-shadow: 0 12px 24px rgba(11, 114, 133, 0.25);
}

.ai-chat-sidebar {
	border-radius: 16px 16px 0 0;
	overflow: hidden;
}

.chat-header,
.chat-input button {
	font-family: "Space Grotesk", sans-serif;
}

@media (max-width: 680px) {
	.layout {
		margin: 1rem auto;
	}

	.main-content {
		padding: 1.2rem;
		border-radius: 18px;
	}
}
</style>


</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- LAYOUT -->
<div class="layout">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN CONTENT -->
<div class="main-content">

<h1 class="page-title">Report History</h1>
<p class="page-subtitle">View previously generated safety reports.</p>

<div class="container-rep-history">

<table class="table">

<thead>
<tr>
<th>Report ID</th>
<th>Project</th>
<th>Model</th>
<th>Risk Level</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reportTable">
</tbody>

</table>

</div>

</div>

</div>

<div class="report-modal" id="reportModal">
<div class="report-modal-card">
<div class="report-modal-header">
<div>
<h2 class="report-modal-title" id="reportModalTitle">Report Details</h2>
<p class="page-subtitle" id="reportModalSubtitle">Preview saved report content.</p>
</div>
<button class="report-modal-close" type="button" onclick="closeReportModal()">&times;</button>
</div>

<div class="report-detail-grid">
<div class="report-detail-card">
<span class="report-detail-label">Report ID</span>
<div id="modalReportId">-</div>
</div>
<div class="report-detail-card">
<span class="report-detail-label">Project</span>
<div id="modalProjectId">-</div>
</div>
<div class="report-detail-card">
<span class="report-detail-label">Risk Level</span>
<div id="modalRiskLevel">-</div>
</div>
<div class="report-detail-card">
<span class="report-detail-label">Created</span>
<div id="modalCreatedAt">-</div>
</div>
<div class="report-detail-card">
<span class="report-detail-label">Layout</span>
<div id="modalLayout">-</div>
</div>
</div>

<div class="report-content-box" id="modalContent">Loading...</div>
</div>
</div>

<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>
<!-- FOOTER -->
<div id="footer"></div>


<!-- LOAD COMPONENTS -->
<script>




/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})


/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

function badgeClass(level){
const normalized = (level || "").toLowerCase()
if(normalized === "high" || normalized === "critical") return "high"
if(normalized === "medium") return "medium"
return "low"
}

function formatDate(value){
if(!value) return "-"
return new Date(value).toLocaleDateString()
}

function renderReports(items){
const table = document.getElementById("reportTable")

if(!items.length){
table.innerHTML = `<tr><td colspan="6">No reports saved yet.</td></tr>`
return
}

table.innerHTML = items.map(item => `
<tr>
<td>RPT-${item.id}</td>
<td>Project ${item.project_id || "-"}</td>
<td>Saved Report</td>
<td><span class="badge ${badgeClass(item.risk_level)}">${item.risk_level}</span></td>
<td>${formatDate(item.created_at)}</td>
<td>
<div class="action-group">
<button class="primary-btn" onclick="viewReport(${item.id})">View</button>
<button class="secondary-btn" onclick="downloadReport(${item.id})">Download</button>
</div>
</td>
</tr>
`).join("")
}

function closeReportModal(){
document.getElementById("reportModal").classList.remove("open")
}

async function viewReport(reportId){
const modal = document.getElementById("reportModal")
document.getElementById("modalReportId").textContent = "RPT-" + reportId
document.getElementById("modalProjectId").textContent = "-"
document.getElementById("modalRiskLevel").textContent = "-"
document.getElementById("modalCreatedAt").textContent = "-"
document.getElementById("modalLayout").textContent = "-"
document.getElementById("modalContent").textContent = "Loading report..."
modal.classList.add("open")

try {
const response = await fetch(`/api/reports/${reportId}`)
if(!response.ok){
throw new Error("Unable to load report details.")
}
const item = await response.json()
document.getElementById("modalProjectId").textContent = item.project_id ? `Project ${item.project_id}` : "-"
document.getElementById("modalRiskLevel").textContent = item.risk_level || "-"
document.getElementById("modalCreatedAt").textContent = formatDate(item.created_at)
document.getElementById("modalLayout").textContent = item.layout_style === "reference" && item.layout_reference_name
? `Reference (${item.layout_reference_name})`
: (item.layout_style || "classic").replace(/^\w/, c => c.toUpperCase())
document.getElementById("modalContent").textContent = item.content || "No report details available."
} catch (error) {
document.getElementById("modalContent").textContent = error.message || "Unable to load report details."
}
}

function downloadReport(reportId){
window.open(`/api/reports/${reportId}/download`, "_blank")
}

fetch("/api/reports")
.then(async res => {
if(!res.ok){
throw new Error("Failed to load reports")
}
return res.json()
})
.then(renderReports)
.catch(() => {
document.getElementById("reportTable").innerHTML = `<tr><td colspan="6">Unable to load report history.</td></tr>`
})

</script>

<script src="../js/main.js"></script>
<script>
initSearch()
wireBackendChat()
document.getElementById("reportModal").addEventListener("click", function(event){
if(event.target.id === "reportModal"){
closeReportModal()
}
})
</script>

</body>
</html>
