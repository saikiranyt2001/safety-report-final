
<!DOCTYPE html>
<html>
<head>

<title>Analytics</title>

<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<div class="logo">AI Safety Platform</div>

<div class="nav-right">
<span>Admin</span>
<button onclick="logout()">Logout</button>
</div>

</div>


<!-- SIDEBAR -->
<div id="sidebar-container"></div>


<!-- MAIN CONTENT -->
<div class="main-content">

<h1>Analytics</h1>


<!-- STATS -->
<div class="stats">

<div class="stat-card">
<h3>78</h3>
<p>Reports Generated</p>
</div>

<div class="stat-card">
<h3>12</h3>
<p>Risk Alerts</p>
</div>

<div class="stat-card">
<h3>86%</h3>
<p>Compliance Rate</p>
</div>

<div class="stat-card">
<h3>5</h3>
<p>Active Sites</p>
</div>

</div>


<!-- CHARTS -->
<div class="charts-grid">

<div class="card">
<h2>Reports Generated Over Time</h2>
<canvas id="reportChart"></canvas>
</div>

<div class="card">
<h2>Hazard Distribution</h2>
<canvas id="hazardChart"></canvas>
</div>

<!-- NEW RISK HEATMAP -->
<div class="card">
<h2>Risk Heatmap</h2>
<canvas id="riskHeatmap" height="250"></canvas>
</div>

</div>

</div>


<!-- AI CHAT -->
<div id="aiChat" class="ai-chat-sidebar">

<div class="chat-header">
AI Safety Assistant
<button class="close-chat" onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>


<!-- CHAT BUTTON -->
<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<!-- LOAD SIDEBAR -->
<script>

<!-- LOAD SIDEBAR -->


fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize search */
initSearch()

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})

</script>


<!-- LOAD FOOTER -->
<script>

fetch("../components/footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer").innerHTML = data
})

</script>


<!-- AUTH -->
<script>

if(!localStorage.getItem("token")){
window.location.href="login.html";
}

function logout(){
localStorage.removeItem("token");
window.location.href="login.html";
}

</script>


<!-- AI CHAT SCRIPT -->
<script>


function sendChat(){

let input=document.getElementById("chatInput")
let text=input.value.trim()

if(text==="") return

addChat(text,"user-msg")

let reply=generateReply(text)

setTimeout(()=>{
addChat(reply,"ai-msg")
},500)

input.value=""

}

function addChat(text,type){

let box=document.getElementById("chatMessages")

let div=document.createElement("div")

div.className=type
div.innerText=text

box.appendChild(div)

box.scrollTop=box.scrollHeight

}

function generateReply(q){

q=q.toLowerCase()

if(q.includes("hazard"))
return "Common hazards include slips, falls, electrical risks, and unsafe machinery."

if(q.includes("osha"))
return "OSHA guidelines focus on PPE, fall protection, and safety training."

if(q.includes("accident"))
return "Reduce accidents by using PPE, safety audits, and hazard reporting."

return "Safety tip: Always conduct risk assessments before starting work."

}

</script>


<!-- CHARTS -->
<script>

const heatmap = document.getElementById("riskHeatmap");

if (heatmap) {

const ctx = heatmap.getContext("2d");

new Chart(ctx,{
type:"bubble",
data:{
datasets:[
{
label:"Low Risk",
data:[
{x:1,y:1,r:8},
{x:1,y:2,r:8}
],
backgroundColor:"rgba(34,197,94,0.7)"
},
{
label:"Medium Risk",
data:[
{x:2,y:3,r:12},
{x:3,y:3,r:12}
],
backgroundColor:"rgba(250,204,21,0.7)"
},
{
label:"High Risk",
data:[
{x:4,y:5,r:18},
{x:5,y:5,r:20}
],
backgroundColor:"rgba(239,68,68,0.8)"
}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
scales:{
x:{
title:{display:true,text:"Likelihood"},
min:0,
max:5
},
y:{
title:{display:true,text:"Severity"},
min:0,
max:5
}
}
}
});

}

const ctx=document.getElementById("reportChart").getContext("2d")

new Chart(ctx,{
type:"bar",
data:{
labels:["Jan","Feb","Mar","Apr","May","Jun"],
datasets:[{
label:"Reports Generated",
data:[12,19,7,14,10,16],
backgroundColor:"#2563eb"
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
})


const ctx2=document.getElementById("hazardChart").getContext("2d")

new Chart(ctx2,{
type:"pie",
data:{
labels:["Fall","Electrical","Equipment"],
datasets:[{
data:[12,8,6],
backgroundColor:["#ff6384","#36a2eb","#ffce56"]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
})

</script>

<script src="../js/main.js"></script>
</body>
</html>
