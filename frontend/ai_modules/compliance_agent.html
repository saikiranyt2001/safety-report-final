<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Compliance Agent</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body class="compliance-page">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN CONTENT -->
<main class="main-content">

<h1 class="page-title">AI Compliance Agent</h1>

<div class="compliance-card">

<p class="upload-text">
Paste safety report or compliance details.
</p>

<textarea id="reportText"
placeholder="Paste safety report or compliance details..."></textarea>

<br>

<button class="detect-btn" onclick="checkCompliance()">
Check Compliance
</button>

<div class="result" id="resultBox">
Compliance result will appear here.
</div>

</div>

</main>


<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

initSidebar()

})

/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

</script>

<script src="../js/main.js"></script>


<!-- AI CHAT SCRIPT -->
<script>

function toggleChat(){

let chat=document.getElementById("aiChat")
chat.classList.toggle("open")

}

function sendChat(){

let input=document.getElementById("chatInput")
let text=input.value.trim()

if(text==="") return

addChat(text,"user-msg")

let reply=generateReply(text)

setTimeout(()=>{
addChat(reply,"ai-msg")
},400)

input.value=""

}

function addChat(text,type){

let box=document.getElementById("chatMessages")

let div=document.createElement("div")

div.className=type
div.innerText=text

box.appendChild(div)

box.scrollTop=box.scrollHeight

}

function generateReply(q){

q=q.toLowerCase()

if(q.includes("hazard"))
return "Common hazards include slips, falls, electrical risks, and unsafe machinery."

if(q.includes("osha"))
return "OSHA guidelines focus on PPE, fall protection, and safety training."

if(q.includes("accident"))
return "Reduce accidents by safety audits and enforcing PPE."

return "Safety tip: Always conduct risk assessments before starting work."

}

document.getElementById("chatInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendChat()
}

})

</script>


<!-- COMPLIANCE LOGIC -->
<script>

function checkCompliance(){

let input = document.getElementById("reportText").value

if(input.trim()===""){
alert("Please enter report text")
return
}

document.getElementById("resultBox").innerHTML=

`
<h3>Compliance Analysis</h3>

<ul>
<li>✔ PPE compliance check required</li>
<li>⚠ Fall protection measures unclear</li>
<li>⚠ Electrical hazard mention detected</li>
</ul>

<p><b>Status:</b> <span class="risk-high">Review Required</span></p>
`

}

</script>

</body>
</html>
