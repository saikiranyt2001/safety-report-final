<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Risk Heatmap - Safety AI</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>


<!-- MAIN CONTENT -->
<main class="main-content">

<h1 class="page-title">AI Risk Heatmap</h1>

<div class="heatmap-card">

<p>AI-generated risk heatmap based on incident reports.</p>

<div class="heatmap">

<div class="cell low">Zone A</div>
<div class="cell medium">Zone B</div>
<div class="cell high">Zone C</div>
<div class="cell low">Zone D</div>
<div class="cell medium">Zone E</div>

<div class="cell medium">Zone F</div>
<div class="cell high">Zone G</div>
<div class="cell low">Zone H</div>
<div class="cell medium">Zone I</div>
<div class="cell high">Zone J</div>

</div>

</div>

</main>


<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize Search AFTER sidebar/navbar loads */
initSearch()

/* Sidebar Toggle Logic */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const mainContent = document.querySelector(".main-content")
const navbar = document.querySelector(".navbar")

if(toggleBtn && sidebar){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(mainContent){
mainContent.classList.toggle("expanded")
}

if(navbar){
navbar.classList.toggle("expanded")
}

}

}

})
/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

</script>

<script src="../js/main.js"></script>


<!-- AI CHAT SCRIPT -->
<script>



function sendChat(){

let input=document.getElementById("chatInput")
let text=input.value.trim()

if(text==="") return

addChat(text,"user-msg")

let reply=generateReply(text)

setTimeout(()=>{
addChat(reply,"ai-msg")
},400)

input.value=""

}

function addChat(text,type){

let box=document.getElementById("chatMessages")

let div=document.createElement("div")

div.className=type
div.innerText=text

box.appendChild(div)

box.scrollTop=box.scrollHeight

}

function generateReply(q){

q=q.toLowerCase()

if(q.includes("hazard"))
return "Common hazards include slips, falls, electrical risks, and unsafe machinery."

if(q.includes("helmet"))
return "Workers must always wear PPE like helmets, gloves, and safety shoes."

if(q.includes("accident"))
return "Reduce accidents by conducting safety audits and enforcing PPE."

return "Safety tip: Always inspect equipment before starting work."

}

document.getElementById("chatInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendChat()
}

})

</script>

</body>
</html>
