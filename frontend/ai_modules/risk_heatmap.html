<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Risk Heatmap - Safety AI</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
	--bg-1: #f1f7ff;
	--bg-2: #e4f4ef;
	--panel: rgba(255, 255, 255, 0.82);
	--panel-strong: #ffffff;
	--text: #102a43;
	--muted: #52606d;
	--primary: #0b7285;
	--warn: #d9480f;
	--border: rgba(16, 42, 67, 0.08);
	--shadow: 0 18px 45px rgba(11, 114, 133, 0.12);
}

* {
	box-sizing: border-box;
}

body {
	margin: 0;
	font-family: "Space Grotesk", sans-serif;
	color: var(--text);
	background:
		radial-gradient(circle at 10% 10%, rgba(47, 158, 68, 0.18), transparent 30%),
		radial-gradient(circle at 90% 15%, rgba(11, 114, 133, 0.17), transparent 28%),
		linear-gradient(135deg, var(--bg-1), var(--bg-2));
	min-height: 100vh;
}

.main-content {
	max-width: 1080px;
	margin: 2rem auto;
	padding: 2rem;
	border: 1px solid var(--border);
	border-radius: 24px;
	background: var(--panel);
	backdrop-filter: blur(4px);
	box-shadow: var(--shadow);
}

.heatmap-header {
	display: flex;
	align-items: end;
	justify-content: space-between;
	gap: 1rem;
	margin-bottom: 1.5rem;
}

.page-title {
	margin: 0;
	font-size: clamp(1.8rem, 4vw, 2.6rem);
	letter-spacing: -0.03em;
}

.heatmap-subtitle {
	margin: 0.35rem 0 0;
	color: var(--muted);
	font-size: 0.98rem;
}

.header-badge {
	background: linear-gradient(135deg, #d3f9d8, #99e9f2);
	color: #0c3f53;
	border: 1px solid rgba(12, 63, 83, 0.2);
	border-radius: 999px;
	padding: 0.45rem 0.9rem;
	font-size: 0.82rem;
	font-weight: 600;
	white-space: nowrap;
}

.heatmap-card {
	border: 1px solid var(--border);
	border-radius: 18px;
	padding: 1.1rem;
	background: var(--panel-strong);
	box-shadow: 0 6px 20px rgba(16, 42, 67, 0.06);
}

.heatmap-card p {
	margin: 0 0 0.9rem;
	color: var(--muted);
}

.heatmap {
	display: grid;
	grid-template-columns: repeat(5, minmax(0, 1fr));
	gap: 0.65rem;
}

.cell {
	border-radius: 12px;
	padding: 0.85rem 0.5rem;
	text-align: center;
	font-weight: 700;
	border: 1px solid rgba(16, 42, 67, 0.1);
}

.cell.low {
	background: linear-gradient(120deg, #d3f9d8, #b2f2bb);
	color: #14532d;
}

.cell.medium {
	background: linear-gradient(120deg, #fff3bf, #ffe066);
	color: #7c4d00;
}

.cell.high {
	background: linear-gradient(120deg, #ffc9c9, #ffa8a8);
	color: #7f1d1d;
}

.chat-toggle-btn {
	border: 0;
	border-radius: 999px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.7rem 1rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	box-shadow: 0 12px 24px rgba(11, 114, 133, 0.25);
}

.ai-chat-sidebar {
	border-radius: 16px 16px 0 0;
	overflow: hidden;
}

.chat-header,
.chat-input button {
	font-family: "Space Grotesk", sans-serif;
}

@media (max-width: 860px) {
	.heatmap {
		grid-template-columns: repeat(3, minmax(0, 1fr));
	}
}

@media (max-width: 680px) {
	.main-content {
		margin: 1rem;
		padding: 1.2rem;
		border-radius: 18px;
	}

	.heatmap-header {
		align-items: flex-start;
		flex-direction: column;
	}

	.heatmap {
		grid-template-columns: repeat(2, minmax(0, 1fr));
	}
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>


<!-- MAIN CONTENT -->
<main class="main-content">

<div class="heatmap-header">
<div>
<h1 class="page-title">AI Risk Heatmap</h1>
<p class="heatmap-subtitle">Visualize risk concentration by operational zone.</p>
</div>
<span class="header-badge">Realtime Map Sync</span>
</div>

<div class="heatmap-card">

<p>AI-generated risk heatmap based on incident reports.</p>

<div class="heatmap">

<div class="cell low">Zone A</div>
<div class="cell medium">Zone B</div>
<div class="cell high">Zone C</div>
<div class="cell low">Zone D</div>
<div class="cell medium">Zone E</div>

<div class="cell medium">Zone F</div>
<div class="cell high">Zone G</div>
<div class="cell low">Zone H</div>
<div class="cell medium">Zone I</div>
<div class="cell high">Zone J</div>

</div>

</div>

</main>


<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize search */
initSearch()

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})

/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

</script>

<script src="../js/main.js"></script>


<!-- AI CHAT SCRIPT -->
<script>



function sendChat(){

let input=document.getElementById("chatInput")
let text=input.value.trim()

if(text==="") return

addChat(text,"user-msg")

let reply=generateReply(text)

setTimeout(()=>{
addChat(reply,"ai-msg")
},400)

input.value=""

}

function addChat(text,type){

let box=document.getElementById("chatMessages")

let div=document.createElement("div")

div.className=type
div.innerText=text

box.appendChild(div)

box.scrollTop=box.scrollHeight

}

function generateReply(q){

q=q.toLowerCase()

if(q.includes("hazard"))
return "Common hazards include slips, falls, electrical risks, and unsafe machinery."

if(q.includes("helmet"))
return "Workers must always wear PPE like helmets, gloves, and safety shoes."

if(q.includes("accident"))
return "Reduce accidents by conducting safety audits and enforcing PPE."

return "Safety tip: Always inspect equipment before starting work."

}

document.getElementById("chatInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendChat()
}

})

</script>

</body>
</html>
