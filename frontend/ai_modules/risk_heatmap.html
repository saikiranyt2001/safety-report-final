<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Risk Heatmap - Safety AI</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
	--bg-1: #f1f7ff;
	--bg-2: #e4f4ef;
	--panel: rgba(255, 255, 255, 0.82);
	--panel-strong: #ffffff;
	--text: #102a43;
	--muted: #52606d;
	--primary: #0b7285;
	--warn: #d9480f;
	--border: rgba(16, 42, 67, 0.08);
	--shadow: 0 18px 45px rgba(11, 114, 133, 0.12);
}

* {
	box-sizing: border-box;
}

body {
	margin: 0;
	font-family: "Space Grotesk", sans-serif;
	color: var(--text);
	background:
		radial-gradient(circle at 10% 10%, rgba(47, 158, 68, 0.18), transparent 30%),
		radial-gradient(circle at 90% 15%, rgba(11, 114, 133, 0.17), transparent 28%),
		linear-gradient(135deg, var(--bg-1), var(--bg-2));
	min-height: 100vh;
}

.main-content {
	max-width: 1080px;
	margin: 2rem auto;
	padding: 2rem;
	border: 1px solid var(--border);
	border-radius: 24px;
	background: var(--panel);
	backdrop-filter: blur(4px);
	box-shadow: var(--shadow);
}

.heatmap-header {
	display: flex;
	align-items: end;
	justify-content: space-between;
	gap: 1rem;
	margin-bottom: 1.5rem;
}

.page-title {
	margin: 0;
	font-size: clamp(1.8rem, 4vw, 2.6rem);
	letter-spacing: -0.03em;
}

.heatmap-subtitle {
	margin: 0.35rem 0 0;
	color: var(--muted);
	font-size: 0.98rem;
}

.header-badge {
	background: linear-gradient(135deg, #d3f9d8, #99e9f2);
	color: #0c3f53;
	border: 1px solid rgba(12, 63, 83, 0.2);
	border-radius: 999px;
	padding: 0.45rem 0.9rem;
	font-size: 0.82rem;
	font-weight: 600;
	white-space: nowrap;
}

.heatmap-card {
	border: 1px solid var(--border);
	border-radius: 18px;
	padding: 1.1rem;
	background: var(--panel-strong);
	box-shadow: 0 6px 20px rgba(16, 42, 67, 0.06);
}

.heatmap-card p {
	margin: 0 0 0.9rem;
	color: var(--muted);
}

.meta-banner {
	display: inline-flex;
	align-items: center;
	gap: 0.45rem;
	margin-bottom: 0.9rem;
	padding: 0.35rem 0.65rem;
	border-radius: 999px;
	background: #f4fbff;
	border: 1px solid rgba(11, 114, 133, 0.14);
	font-size: 0.8rem;
	font-weight: 700;
	color: var(--primary);
}

.heatmap {
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
	gap: 0.65rem;
}

.cell {
	border-radius: 12px;
	padding: 0.85rem 0.5rem;
	text-align: left;
	border: 1px solid rgba(16, 42, 67, 0.1);
	min-height: 110px;
	display: flex;
	flex-direction: column;
	gap: 0.35rem;
}

.cell.low {
	background: linear-gradient(120deg, #d3f9d8, #b2f2bb);
	color: #14532d;
}

.cell.medium {
	background: linear-gradient(120deg, #fff3bf, #ffe066);
	color: #7c4d00;
}

.cell.high {
	background: linear-gradient(120deg, #ffc9c9, #ffa8a8);
	color: #7f1d1d;
}

.cell strong {
	font-size: 1rem;
}

.cell small {
	font-size: 0.8rem;
	line-height: 1.45;
}

.cell .score {
	font-size: 0.82rem;
	font-weight: 700;
}

.empty-state {
	padding: 1rem;
	border-radius: 14px;
	background: #f8fbfd;
	border: 1px dashed rgba(16, 42, 67, 0.16);
	color: var(--muted);
}

.chat-toggle-btn {
	border: 0;
	border-radius: 999px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.7rem 1rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	box-shadow: 0 12px 24px rgba(11, 114, 133, 0.25);
}

.ai-chat-sidebar {
	border-radius: 16px 16px 0 0;
	overflow: hidden;
}

.chat-header,
.chat-input button {
	font-family: "Space Grotesk", sans-serif;
}

@media (max-width: 860px) {
	.heatmap {
		grid-template-columns: repeat(3, minmax(0, 1fr));
	}
}

@media (max-width: 680px) {
	.main-content {
		margin: 1rem;
		padding: 1.2rem;
		border-radius: 18px;
	}

	.heatmap-header {
		align-items: flex-start;
		flex-direction: column;
	}

	.heatmap {
		grid-template-columns: repeat(2, minmax(0, 1fr));
	}
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>


<!-- MAIN CONTENT -->
<main class="main-content">

<div class="heatmap-header">
<div>
<h1 class="page-title">AI Risk Heatmap</h1>
<p class="heatmap-subtitle">Visualize risk concentration by operational zone.</p>
</div>
<span class="header-badge">Realtime Map Sync</span>
</div>

<div class="heatmap-card">

<p>Heatmap updates from saved report locations and risk severity.</p>
<div class="meta-banner" id="heatmapMeta">Loading report-driven heatmap...</div>

<div class="heatmap" id="heatmapGrid">
</div>

</div>

</main>


<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})

/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

</script>

<script src="../js/main.js"></script>
<script>
function renderHeatmap(zones, engine, reportCount){
	const grid = document.getElementById("heatmapGrid")
	const meta = document.getElementById("heatmapMeta")
	meta.textContent = `Engine: ${String(engine || "rules").toUpperCase()} | Reports mapped: ${reportCount || 0}`

	if(!zones || !zones.length){
		grid.innerHTML = `<div class="empty-state">No saved reports with location details are available yet. Generate reports with a location to populate the heatmap.</div>`
		return
	}

	grid.innerHTML = zones.map(zone => `
		<div class="cell ${zone.risk_level || "low"}">
			<strong>${zone.zone}</strong>
			<div class="score">Risk Score: ${zone.risk_score}</div>
			<small>Hazard: ${zone.top_hazard || "General Safety"}</small>
			<small>${zone.summary || ""}</small>
		</div>
	`).join("")
}

async function loadRiskHeatmap(){
	try {
		const response = await fetch("/api/analytics/zone-heatmap")
		if(!response.ok){
			throw new Error("Unable to load heatmap data.")
		}
		const data = await response.json()
		renderHeatmap(data.zones || [], data.engine, data.report_count)
	} catch (error) {
		document.getElementById("heatmapMeta").textContent = "Heatmap unavailable"
		document.getElementById("heatmapGrid").innerHTML = `<div class="empty-state">${error.message || "Unable to load heatmap data."}</div>`
	}
}

initSearch()
wireBackendChat()
loadRiskHeatmap()
</script>

</body>
</html>
