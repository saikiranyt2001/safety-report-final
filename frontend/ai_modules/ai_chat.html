<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Safety Assistant</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
	--bg-1: #f1f7ff;
	--bg-2: #e4f4ef;
	--panel: rgba(255, 255, 255, 0.82);
	--panel-strong: #ffffff;
	--text: #102a43;
	--muted: #52606d;
	--primary: #0b7285;
	--border: rgba(16, 42, 67, 0.08);
	--shadow: 0 18px 45px rgba(11, 114, 133, 0.12);
}

* { box-sizing: border-box; }

body {
	margin: 0;
	font-family: "Space Grotesk", sans-serif;
	color: var(--text);
	background:
		radial-gradient(circle at 10% 10%, rgba(47, 158, 68, 0.18), transparent 30%),
		radial-gradient(circle at 90% 15%, rgba(11, 114, 133, 0.17), transparent 28%),
		linear-gradient(135deg, var(--bg-1), var(--bg-2));
	min-height: 100vh;
}

.main-content {
	max-width: 1080px;
	margin: 2rem auto;
	padding: 2rem;
	border: 1px solid var(--border);
	border-radius: 24px;
	background: var(--panel);
	backdrop-filter: blur(4px);
	box-shadow: var(--shadow);
}

.chat-header-panel {
	display: flex;
	align-items: end;
	justify-content: space-between;
	gap: 1rem;
	margin-bottom: 1rem;
}

.chat-header-panel h1 {
	margin: 0;
	font-size: clamp(1.8rem, 4vw, 2.5rem);
	letter-spacing: -0.03em;
}

.chat-header-panel p {
	margin: 0.35rem 0 0;
	color: var(--muted);
	font-size: 0.98rem;
}

.header-badge {
	background: linear-gradient(135deg, #d3f9d8, #99e9f2);
	color: #0c3f53;
	border: 1px solid rgba(12, 63, 83, 0.2);
	border-radius: 999px;
	padding: 0.45rem 0.9rem;
	font-size: 0.82rem;
	font-weight: 600;
	white-space: nowrap;
}

.prompt-chips {
	display: flex;
	flex-wrap: wrap;
	gap: 0.5rem;
	margin: 0 0 1rem;
}

.prompt-chip {
	border: 1px solid var(--border);
	background: #fff;
	padding: 0.45rem 0.7rem;
	border-radius: 999px;
	font-size: 0.82rem;
	cursor: pointer;
	color: #20435a;
}

.assistant-card {
	border: 1px solid var(--border);
	border-radius: 18px;
	background: var(--panel-strong);
	box-shadow: 0 6px 20px rgba(16, 42, 67, 0.06);
	display: grid;
	grid-template-rows: 1fr auto;
	height: min(70vh, 640px);
}

#chatMessages {
	padding: 1rem;
	overflow-y: auto;
	display: flex;
	flex-direction: column;
	gap: 0.7rem;
}

.user-msg,
.ai-msg {
	max-width: 82%;
	padding: 0.7rem 0.85rem;
	border-radius: 12px;
	line-height: 1.5;
	white-space: pre-wrap;
}

.user-msg {
	align-self: flex-end;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
}

.ai-msg {
	align-self: flex-start;
	background: #f3f8ff;
	border: 1px solid rgba(16, 42, 67, 0.1);
	color: #17344a;
}

.chat-input-row {
	display: grid;
	grid-template-columns: 1fr auto;
	gap: 0.6rem;
	padding: 0.9rem;
	border-top: 1px solid rgba(16, 42, 67, 0.08);
}

#chatInput {
	border: 1px solid var(--border);
	border-radius: 10px;
	padding: 0.62rem 0.72rem;
	font-family: "Space Grotesk", sans-serif;
	font-size: 0.95rem;
}

.send-btn {
	border: 0;
	border-radius: 10px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.62rem 1rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	cursor: pointer;
}

@media (max-width: 680px) {
	.main-content {
		margin: 1rem;
		padding: 1.2rem;
		border-radius: 18px;
	}

	.chat-header-panel {
		flex-direction: column;
		align-items: flex-start;
	}

	.assistant-card {
		height: 72vh;
	}
}
</style>
</head>

<body>
<div id="sidebar-container"></div>

<main class="main-content">
	<div class="chat-header-panel">
		<div>
			<h1>AI Safety Assistant</h1>
			<p>RAG-powered advisor for hazards, PPE, and safety regulations.</p>
		</div>
		<span class="header-badge">RAG Advisor Online</span>
	</div>

	<div class="prompt-chips">
		<button class="prompt-chip" onclick="usePrompt('What hazards exist in construction scaffolding?')">Scaffolding Hazards</button>
		<button class="prompt-chip" onclick="usePrompt('What PPE is required for welding?')">Welding PPE</button>
		<button class="prompt-chip" onclick="usePrompt('Explain OSHA fall protection rules.')">OSHA Fall Protection</button>
	</div>

	<div class="assistant-card">
		<div id="chatMessages">
			<div class="ai-msg">Hello, I am your AI Safety Advisor. Ask about hazards, PPE requirements, and regulations.</div>
		</div>
		<div class="chat-input-row">
			<input id="chatInput" placeholder="Ask a safety question...">
			<button class="send-btn" onclick="sendChat()">Send</button>
		</div>
	</div>
</main>

<div id="footer"></div>

<script>
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {
	document.getElementById("sidebar-container").innerHTML = data
	initSearch()

	const toggleBtn = document.getElementById("menuToggle")
	const sidebar = document.querySelector(".sidebar")
	const navbar = document.querySelector(".navbar")
	const mainContent = document.querySelector(".main-content")

	if(toggleBtn){
		toggleBtn.onclick = function(){
			sidebar.classList.toggle("collapsed")
			if(navbar) navbar.classList.toggle("expanded")
			if(mainContent) mainContent.classList.toggle("expanded")
		}
	}
})

fetch("../components/footer.html")
.then(res => res.text())
.then(data => {
	document.getElementById("footer").innerHTML = data
})
</script>

<script src="../js/main.js"></script>

<script>
const API_URL = window.location.origin;

function addMessage(text, type){
	const messages = document.getElementById("chatMessages");
	const msg = document.createElement("div");
	msg.className = type;
	msg.innerText = text;
	messages.appendChild(msg);
	messages.scrollTop = messages.scrollHeight;
}

function usePrompt(prompt){
	document.getElementById("chatInput").value = prompt;
	sendChat();
}

async function sendChat(){
	const input = document.getElementById("chatInput");
	const message = input.value.trim();
	if(!message) return;

	addMessage(message, "user-msg");
	input.value = "";

	try {
		const token = localStorage.getItem("auth_token") || localStorage.getItem("token");
		const headers = { "Content-Type": "application/json" };

		if(token && token !== "loggedin"){
			headers["Authorization"] = "Bearer " + token;
		}

		const response = await fetch(API_URL + "/api/ai-chat", {
			method: "POST",
			headers: headers,
			body: JSON.stringify({ prompt: message })
		});

		if(!response.ok){
			throw new Error("Chat request failed");
		}

		const data = await response.json();
		addMessage(data.response || "No response available.", "ai-msg");
	} catch(_error){
		addMessage("AI safety assistant is temporarily unavailable. Please try again.", "ai-msg");
	}
}

document.getElementById("chatInput").addEventListener("keypress", function(e){
	if(e.key === "Enter"){
		sendChat();
	}
});
</script>
</body>
</html>
