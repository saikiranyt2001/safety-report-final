<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Hazard Detection</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body class="hazard-page">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN CONTENT -->
<main class="main-content">

<h1 class="page-title">AI Hazard Detection</h1>

<div class="hazard-card">

<p class="upload-text">
Upload a workplace image to detect safety hazards.
</p>

<input type="file" id="imageUpload" onchange="previewImage()">

<img id="previewImage" class="preview-img">

<br>

<button class="detect-btn" onclick="detectHazard()">
Detect Hazards
</button>

<div class="result" id="resultBox">
Hazard detection results will appear here.
</div>

</div>

</main>


<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize Search AFTER sidebar/navbar loads */
initSearch()

/* Sidebar Toggle Logic */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const mainContent = document.querySelector(".main-content")
const navbar = document.querySelector(".navbar")

if(toggleBtn && sidebar){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(mainContent){
mainContent.classList.toggle("expanded")
}

if(navbar){
navbar.classList.toggle("expanded")
}

}

}

})
/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

</script>

<script src="../js/main.js"></script>


<!-- IMAGE PREVIEW -->
<script>

function previewImage(){

let file=document.getElementById("imageUpload").files[0]

if(!file) return

let reader=new FileReader()

reader.onload=function(e){

let img=document.getElementById("previewImage")

img.src=e.target.result
img.style.display="block"

}

reader.readAsDataURL(file)

}

</script>


<!-- HAZARD DETECTION -->
<script>

function detectHazard(){

let file = document.getElementById("imageUpload").files[0];

if(!file){
alert("Please upload an image first.");
return;
}

document.getElementById("resultBox").innerHTML=

`
<h3>Detection Result</h3>

<ul>
<li>⚠ Worker without helmet</li>
<li>⚠ Unsafe ladder position</li>
</ul>

<p><b>Risk Level:</b> <span class="risk-high">HIGH</span></p>
`

}

</script>


<!-- AI CHAT SCRIPT -->
<script>



function sendChat(){

let input=document.getElementById("chatInput")
let text=input.value.trim()

if(text==="") return

addChat(text,"user-msg")

let reply=generateReply(text)

setTimeout(()=>{
addChat(reply,"ai-msg")
},400)

input.value=""

}

function addChat(text,type){

let box=document.getElementById("chatMessages")

let div=document.createElement("div")

div.className=type
div.innerText=text

box.appendChild(div)

box.scrollTop=box.scrollHeight

}

function generateReply(q){

q=q.toLowerCase()

if(q.includes("hazard"))
return "Common hazards include slips, falls, electrical risks, and unsafe machinery."

if(q.includes("helmet"))
return "Workers must always wear PPE like helmets, gloves, and safety shoes."

if(q.includes("accident"))
return "Reduce accidents by conducting safety audits and enforcing PPE."

return "Safety tip: Always inspect equipment before starting work."

}

document.getElementById("chatInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendChat()
}

})

</script>

</body>
</html>
