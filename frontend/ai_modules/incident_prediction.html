<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Incident Prediction</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
	--bg-1: #f1f7ff;
	--bg-2: #e4f4ef;
	--panel: rgba(255, 255, 255, 0.82);
	--panel-strong: #ffffff;
	--text: #102a43;
	--muted: #52606d;
	--primary: #0b7285;
	--accent: #2f9e44;
	--warn: #d9480f;
	--border: rgba(16, 42, 67, 0.08);
	--shadow: 0 18px 45px rgba(11, 114, 133, 0.12);
}

* {
	box-sizing: border-box;
}

body.incident-page {
	margin: 0;
	font-family: "Space Grotesk", sans-serif;
	color: var(--text);
	background:
		radial-gradient(circle at 10% 10%, rgba(47, 158, 68, 0.18), transparent 30%),
		radial-gradient(circle at 90% 15%, rgba(11, 114, 133, 0.17), transparent 28%),
		linear-gradient(135deg, var(--bg-1), var(--bg-2));
	min-height: 100vh;
}

.main-content {
	max-width: 1080px;
	margin: 2rem auto;
	padding: 2rem;
	border: 1px solid var(--border);
	border-radius: 24px;
	background: var(--panel);
	backdrop-filter: blur(4px);
	box-shadow: var(--shadow);
}

.incident-header {
	display: flex;
	align-items: end;
	justify-content: space-between;
	gap: 1rem;
	margin-bottom: 1.5rem;
}

.page-title {
	margin: 0;
	font-size: clamp(1.8rem, 4vw, 2.6rem);
	letter-spacing: -0.03em;
}

.incident-subtitle {
	margin: 0.35rem 0 0;
	color: var(--muted);
	font-size: 0.98rem;
}

.header-badge {
	background: linear-gradient(135deg, #d3f9d8, #99e9f2);
	color: #0c3f53;
	border: 1px solid rgba(12, 63, 83, 0.2);
	border-radius: 999px;
	padding: 0.45rem 0.9rem;
	font-size: 0.82rem;
	font-weight: 600;
	white-space: nowrap;
}

.incident-card {
	border: 1px solid var(--border);
	border-radius: 18px;
	padding: 1.1rem;
	background: var(--panel-strong);
	box-shadow: 0 6px 20px rgba(16, 42, 67, 0.06);
}

.incident-card p {
	margin: 0 0 0.9rem;
	color: var(--muted);
}

.incident-card label {
	display: block;
	font-size: 0.92rem;
	font-weight: 600;
	margin-bottom: 0.4rem;
	color: #234;
}

.incident-card select,
.incident-card input {
	width: 100%;
	padding: 0.62rem 0.68rem;
	border: 1px solid var(--border);
	border-radius: 10px;
	background: #f8fbfd;
	font-family: "Space Grotesk", sans-serif;
	font-size: 0.95rem;
}

.incident-card br {
	display: none;
}

#workers,
#violations,
#environment {
	margin-bottom: 0.85rem;
}

.detect-btn {
	border: 0;
	border-radius: 12px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.72rem 1rem;
	margin-top: 0.2rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	cursor: pointer;
	box-shadow: 0 12px 24px rgba(11, 114, 133, 0.24);
}

.result {
	margin-top: 1rem;
	border: 1px solid rgba(16, 42, 67, 0.1);
	background: linear-gradient(90deg, #f8fbfd, #edf8f2);
	border-radius: 12px;
	padding: 0.9rem;
	font-size: 0.95rem;
}

.result ul {
	margin: 0.5rem 0;
	padding-left: 1rem;
}

.risk-high {
	color: var(--warn);
	font-weight: 700;
}

.chat-toggle-btn {
	border: 0;
	border-radius: 999px;
	background: linear-gradient(120deg, #0b7285, #2f9e44);
	color: #fff;
	padding: 0.7rem 1rem;
	font-family: "Space Grotesk", sans-serif;
	font-weight: 600;
	box-shadow: 0 12px 24px rgba(11, 114, 133, 0.25);
}

.ai-chat-sidebar {
	border-radius: 16px 16px 0 0;
	overflow: hidden;
}

.chat-header,
.chat-input button {
	font-family: "Space Grotesk", sans-serif;
}

@media (max-width: 680px) {
	.main-content {
		margin: 1rem;
		padding: 1.2rem;
		border-radius: 18px;
	}

	.incident-header {
		align-items: flex-start;
		flex-direction: column;
	}
}
</style>

</head>

<body class="incident-page">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>


<!-- MAIN CONTENT -->
<main class="main-content">

<div class="incident-header">
<div>
<h1 class="page-title">Incident Prediction</h1>
<p class="incident-subtitle">Predict potential incidents from live workplace conditions.</p>
</div>
<span class="header-badge">AI Risk Engine Active</span>
</div>

<div class="incident-card">

<p>AI predicts potential workplace incidents based on conditions.</p>

<label>Work Environment</label>

<select id="environment">
<option>Construction Site</option>
<option>Factory Floor</option>
<option>Warehouse</option>
<option>Office</option>
</select>

<br><br>

<label>Number of Workers</label>
<input type="number" id="workers" placeholder="Enter number of workers">

<br><br>

<label>Safety Violations Reported</label>
<input type="number" id="violations" placeholder="Enter violations">

<br><br>

<button class="detect-btn" onclick="predictIncident()">
Predict Risk
</button>

<div class="result" id="resultBox">
Prediction result will appear here.
</div>

</div>

</main>


<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>


<!-- FOOTER -->
<div id="footer"></div>


<script>

/* LOAD SIDEBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize search */
initSearch()

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})

/* LOAD FOOTER */
fetch("../components/footer.html")
.then(res => res.text())
.then(data => {

document.getElementById("footer").innerHTML = data

})

</script>

<script src="../js/main.js"></script>


<!-- INCIDENT PREDICTION -->
<script>
wireBackendChat()

function predictIncident(){

let workers = document.getElementById("workers").value
let violations = document.getElementById("violations").value

if(workers === "" || violations === ""){
alert("Please fill all fields")
return
}

fetch("/api/incident-prediction", {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer " + (getStoredToken() || "")
},
body: JSON.stringify({
environment: document.getElementById("environment").value,
workers: Number(workers),
violations: Number(violations)
})
})
.then(async res => {
if(!res.ok){
const errorText = await res.text()
throw new Error(errorText || "Prediction failed")
}
return res.json()
})
.then(data => {
document.getElementById("resultBox").innerHTML =
`
<h3>AI Prediction Result</h3>
<p><b>Risk Level:</b> <span class="risk-high">${data.risk_level}</span></p>
<p><b>Risk Score:</b> ${data.risk_score}/100</p>
<p><b>Recommended Actions:</b></p>
<ul>
${(data.recommended_actions || []).map(item => `<li>${item}</li>`).join("")}
</ul>
`
})
.catch(error => {
document.getElementById("resultBox").innerHTML = `<p>${error.message}</p>`
})

}

</script>

</body>
</html>
