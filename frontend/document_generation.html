<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Document Generation</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/chat.css">

<script src="js/auth.js"></script>

</head>

<body>

<script>
checkAuth();
</script>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- LAYOUT -->
<div class="layout">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN CONTENT -->
<div class="main-content">

<h1 class="page-title">Generate Safety Document</h1>
<p class="page-subtitle">Generate AI-powered workplace safety documents.</p>

<div class="container-rep-history">

<label class="form-label">Report Type</label>

<select id="reportType" class="form-input">
<option value="WHS">WHS Report</option>
<option value="Incident">Incident Report</option>
<option value="Risk">Risk Assessment</option>
<option value="SWMS">SWMS</option>
<option value="JSA">JSA</option>
</select>

<label class="form-label">Project ID</label>

<input
type="number"
id="projectId"
placeholder="Enter Project ID"
class="form-input"
>

<button onclick="generateDocument()" class="primary-btn">
Generate Document
</button>

<div id="docResult" class="form-success"></div>

<a href="ai_tools/ai_report_chat.html" class="link-btn">
Go to AI Report Chat
</a>

</div>

</div>
</div>

<!-- AI CHAT -->
<div class="ai-chat-sidebar" id="aiChat">

<div class="chat-header">
<span>AI Safety Assistant</span>
<button onclick="toggleChat()">✖</button>
</div>

<div class="chat-messages" id="chatMessages">
<div class="ai-msg">Hello! Ask me about workplace safety.</div>
</div>

<div class="chat-input">
<input id="chatInput" placeholder="Ask a question...">
<button onclick="sendChat()">Send</button>
</div>

</div>

<button class="chat-toggle-btn" onclick="toggleChat()">
💬 AI Assistant
</button>

<!-- FOOTER -->
<div id="footer"></div>

<script>

/* LOAD NAVBAR */
fetch("../components/sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data

/* Initialize search */
initSearch()

/* Sidebar Toggle */

const toggleBtn = document.getElementById("menuToggle")
const sidebar = document.querySelector(".sidebar")
const navbar = document.querySelector(".navbar")
const mainContent = document.querySelector(".main-content")

if(toggleBtn){

toggleBtn.onclick = function(){

sidebar.classList.toggle("collapsed")

if(navbar) navbar.classList.toggle("expanded")
if(mainContent) mainContent.classList.toggle("expanded")

/* footer loads later */
const footer = document.querySelector(".footer")

if(footer){
footer.classList.toggle("expanded")
}

}

}
})

/* LOAD FOOTER */
fetch("components/footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer").innerHTML = data
})

function generateDocument(){

const reportType = document.getElementById("reportType").value
const projectId = document.getElementById("projectId").value

fetch("/api/generate-report",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
report_type: reportType,
project_id: parseInt(projectId)
})

})

.then(res => res.json())
.then(data => {

document.getElementById("docResult").innerText =
data.document || "No document generated."

})

}

</script>

<script src="js/main.js"></script>

</body>
</html>
